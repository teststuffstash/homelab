# ADR-087 / FU-018 leg A: per-PROJECT-namespace get-secrets Roles for the egress proxy's
# opaque-ref resolution (SA openrouter-proxy/agent-egress; the SA itself lives in the proxy app —
# its kustomize namespace transformer can't host cross-namespace RBAC). The proxy code honors
# only Secrets labeled openrouter.teststuff.net/session-key. Namespace list = fixer-onboarded
# repos; extend on onboarding (FU-052); the AgentStack XRD renders these eventually (FU-048).
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openrouter-proxy-session-keys
  namespace: sleep-tracking
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openrouter-proxy-session-keys
  namespace: sleep-tracking
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: openrouter-proxy-session-keys }
subjects:
  - { kind: ServiceAccount, name: openrouter-proxy, namespace: agent-egress }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openrouter-proxy-session-keys
  namespace: oracle-fleet
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openrouter-proxy-session-keys
  namespace: oracle-fleet
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: openrouter-proxy-session-keys }
subjects:
  - { kind: ServiceAccount, name: openrouter-proxy, namespace: agent-egress }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openrouter-proxy-session-keys
  namespace: openrouter-operator
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openrouter-proxy-session-keys
  namespace: openrouter-operator
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: openrouter-proxy-session-keys }
subjects:
  - { kind: ServiceAccount, name: openrouter-proxy, namespace: agent-egress }
