# Reviewer git token (agents/reviewer-session.sh, docs/agents/workflow.md). Mints the `reviewer-git`
# Secret the reviewer pod mounts as GH_TOKEN — the review bot's GitHub identity for `gh pr review
# --approve` / `--request-changes`. Distinct from coordinator-git/agent-git-token ON PURPOSE: those
# are homelab-agents[bot] (the PR author), and GitHub blocks self-approval. This is homelab-reviewer[bot].
#
# ⚠️ SCAFFOLD — prereqs (one-time): the homelab-reviewer App is bootstrapped + its key is in Infisical
# (scripts/github-reviewer-app-bootstrap.sh) and installed on the agent repos. Fill appID/installID
# below from `…reviewer-app-bootstrap.sh secrets`. Applied with kubectl (not ArgoCD), AFTER rbac.yaml:
#   kubectl --kubeconfig tofu/kubeconfig apply -f agents/coordinator/reviewer-git.yaml
---
# 1) App private key: Infisical → a k8s Secret in this namespace the generator reads.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: reviewer-github-app
  namespace: agent-coordinator
spec:
  refreshInterval: 1h
  secretStoreRef: { name: infisical, kind: ClusterSecretStore }
  target:
    name: reviewer-github-app
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        privateKey: '{{ .pem | replace "\\n" "\n" }}'
  data:
    - secretKey: pem
      remoteRef: { key: REVIEWER_GH_APP_PRIVATE_KEY }
---
# 2) The generator: mint an installation token — contents:write + pull_requests:write. contents:WRITE is
# required for homelab-reviewer[bot]'s approval to COUNT toward the required-approval ruleset — GitHub only
# counts reviews from a reviewer with repo write access; contents:read → authorAssociation NONE, ignored
# (learned 2026-07-02). The reviewer still never merges — GitHub auto-merge does that once approval + CI pass.
apiVersion: generators.external-secrets.io/v1alpha1
kind: GithubAccessToken
metadata:
  name: reviewer-git-gen
  namespace: agent-coordinator
spec:
  appID: "4199252"           # homelab-reviewer App (github-reviewer-app-bootstrap.sh, 2026-07-02)
  installID: "143941082"     # the teststuffstash installation of homelab-reviewer
  auth:
    privateKey:
      secretRef: { name: reviewer-github-app, key: privateKey }
  permissions:
    contents: write          #   clone the PR branch + make the bot a repo WRITER so its approval counts
    pull_requests: write     #   submit the review (approve / request-changes) + inline comments
    checks: read             #   independently confirm CI-green on the head it reviews (App grant
    statuses: read           #   widened by the operator 2026-07-10 — the PR #6 re-review had to
    actions: read            #   caveat "CI not independently confirmed"; these three close that)
  repositories:              #   the repos where agent PRs land (mirror coordinator-git; verify
    - sleep-tracking         #   docs/github-apps.md covers each BEFORE adding — ESO 422s otherwise)
    - snore-recorder
    - sleep-iac
    - openrouter-operator
    - oracle-fleet
    - oracle-iac
    # Platform-image repos (App installed per docs/github-apps.md; found missing 2026-07-16 when
    # the agent-runtime#14 reviewer produced a verdict it could not SUBMIT — token not scoped here):
    - agent-runtime
    - agent-coordinator
---
# 3) Drive the generator → the Secret the reviewer pod reads as GH_TOKEN (key `token` → GH_TOKEN).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: reviewer-git
  namespace: agent-coordinator
spec:
  refreshInterval: 45m
  target:
    name: reviewer-git
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        GH_TOKEN: '{{ .token }}'
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: GithubAccessToken
          name: reviewer-git-gen
