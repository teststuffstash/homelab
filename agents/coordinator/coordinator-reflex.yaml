# Coordinator reflex CronJob (FU-050) — the LLM sibling of review-reflex: runs the DETERMINISTIC
# gate `agents/coordinator-scan.sh --spawn` on a schedule, which wakes a scoped LLM coordinator tick
# ONLY when a stack has actionable work (queued issue / stalled in-progress / coordinator-lane PR).
# No subscription tokens are ever spent discovering "nothing to do" — the gate is the whole point.
#
# ⚠ DEPLOYED SUSPENDED. Unsuspending this is the "graduate to autonomy" switch (platform-and-stacks.md
# §Migration path step 2) — a scheduler swap, not a behavior change, but it means coordinator ticks
# (and the worker dispatches they make) start happening with NO human watching. The operator flips it
# deliberately, after a clean supervised acceptance round:
#   kubectl -n agent-coordinator patch cronjob coordinator-reflex -p '{"spec":{"suspend":false}}'
#
# Loop-safety inherited (TICK-LOG §Loop safety): the execution gate is a human-applied label
# (agent/queued), the per-session budget key is the economic ceiling, rounds bound at 3 → blocked,
# and the launcher pre-flight (FU-042) refuses double-dispatch — all four breakers hold unattended.
#
# Same identity/shape as review-reflex.yaml (the coordinator subsystem's other reflex): SA
# agent-coordinator, fresh homelab clone each tick (reflex scope ALWAYS derives from the committed
# stacks.json — reflex-design lesson #4), coordinator image (gh/kubectl/claude baked).
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: coordinator-reflex
  namespace: agent-coordinator
spec:
  suspend: true                     # ← the autonomy switch; see the header
  schedule: "*/10 * * * *"
  # A tick spawns a coordinator pod and blocks while it reconciles (~3-6 min); never overlap ticks —
  # level-triggered re-listing makes a skipped tick free.
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0               # no retry — the next cron tick is the retry
      activeDeadlineSeconds: 1500   # a hung coordinator never wedges the reflex forever
      template:
        metadata:
          labels: { app: coordinator-reflex }
        spec:
          restartPolicy: Never
          serviceAccountName: agent-coordinator
          terminationGracePeriodSeconds: 5
          securityContext:
            fsGroup: 1000
          initContainers:
            - name: clone-homelab
              image: ghcr.io/teststuffstash/agent-coordinator:2026.7.8-g916d1ef5a81c
              command: ["bash", "-lc"]
              args: ["set -e; rm -rf /work/homelab; git clone --depth 1 -b master https://github.com/teststuffstash/homelab.git /work/homelab"]
              volumeMounts:
                - { name: work, mountPath: /work }
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
                seccompProfile: { type: RuntimeDefault }
              resources:
                requests: { cpu: "100m", memory: "128Mi" }
                limits:   { cpu: "1",    memory: "512Mi" }
          containers:
            - name: reflex
              image: ghcr.io/teststuffstash/agent-coordinator:2026.7.8-g916d1ef5a81c
              command: ["bash", "-lc"]
              args: ["exec bash /work/homelab/agents/coordinator-scan.sh --spawn"]
              env:
                - name: HOME
                  value: "/home/node"
                - name: ORG
                  value: "teststuffstash"
                # gh for the gate's issue/PR listing; the image's gh-wrapper reads the LIVE ~1h token
                # from GH_TOKEN_FILE (ESO re-mints it); GH_TOKEN env is the frozen fallback.
                - name: GH_TOKEN
                  valueFrom:
                    secretKeyRef: { name: coordinator-git, key: GH_TOKEN, optional: true }
                - name: GH_TOKEN_FILE
                  value: "/var/run/coordinator-git/GH_TOKEN"
              volumeMounts:
                - { name: work, mountPath: /work }
                - { name: coordinator-git, mountPath: /var/run/coordinator-git, readOnly: true }
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
                seccompProfile: { type: RuntimeDefault }
              resources:
                requests: { cpu: "200m", memory: "256Mi" }
                limits:   { cpu: "2",    memory: "1Gi" }
          volumes:
            - name: work
              emptyDir: {}
            - name: coordinator-git
              secret: { secretName: coordinator-git, optional: true }
