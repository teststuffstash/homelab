# Transcript browser (docs/agents/observability-and-retro.md §A2, P1):
# claude-code-history-viewer in server mode (upstream: https://github.com/jhlee0409/claude-code-history-viewer
# — no published image, so we build+push ghcr.io/teststuffstash/cchv-server from the upstream tag via
# agent-runtime .github/workflows/build-viewer-image.yaml; PIN the tag here, never :latest).
#
# INTERNAL ONLY: transcripts contain repo content (some repos private). Reached at
# https://transcripts.local.teststuff.net via the standard internal path — OPNsense HAProxy VIP →
# this Service's BGP LoadBalancer VIP (ansible/group_vars/opnsense.yml). --no-auth: the LAN boundary
# is the auth boundary, same as other internal UIs; nothing here is ever exposed via the tunnel.
#
# The sync sidecar mirrors the bucket and runs transcripts-sync-script.yaml's sync.py each tick
# (FU-061 + FU-057): it maps CLAUDE-FORMAT JSONL (coordinator + reviewer) into ~/.claude/projects/,
# REWRITING each session's `cwd` to a shared `/<project>--<issue>` so all of one issue's sessions
# group under ONE project (the viewer labels by cwd), AND merges the uploaded GOOSE worker
# sessions.db files into one ~/.local/share/goose/sessions/sessions.db that cchv reads natively (no
# converter — cchv reads goose's SQLite sessions+messages; corrected 2026-07-09). So worker sessions
# now render turn-by-turn beside coordinator/reviewer, grouped by issue.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transcripts-viewer
  namespace: agent-coordinator
  labels:
    app: transcripts-viewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transcripts-viewer
  template:
    metadata:
      labels:
        app: transcripts-viewer
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: viewer
          image: ghcr.io/teststuffstash/cchv-server:v1.18.0
          command: ["cchv-server"]
          # --allow-unsafe-no-auth: cchv refuses --no-auth on a non-loopback bind without it. The
          # unauthenticated bind is intentional — the LAN is the auth boundary (never tunneled).
          args: ["--serve", "--host", "0.0.0.0", "--port", "3727", "--no-auth", "--allow-unsafe-no-auth"]
          ports:
            - { name: http, containerPort: 3727 }
          volumeMounts:
            # The viewer scans ~/.claude/projects (its Docker user is `cchv`) for claude sessions and
            # ~/.local/share/goose/sessions/sessions.db for goose worker sessions (fixed path).
            - { name: claude-data, mountPath: /home/cchv/.claude }
            - { name: goose-data, mountPath: /home/cchv/.local/share/goose }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "1",   memory: "512Mi" }
        - name: bucket-sync
          # Coordinator image: bash + s5cmd. Keep the tag in lockstep with images.env.
          image: ghcr.io/teststuffstash/agent-coordinator:2026.7.8-g916d1ef5a81c
          command: ["bash", "-lc"]
          args:
            - |
              set -u
              command -v s5cmd  >/dev/null 2>&1 || { echo "s5cmd not in this image — bump the tag"; exit 1; }
              command -v python3 >/dev/null 2>&1 || { echo "python3 not in this image — bump the tag"; exit 1; }
              export AWS_ACCESS_KEY_ID="$READER_ID" AWS_SECRET_ACCESS_KEY="$READER_SECRET" AWS_REGION=garage
              mkdir -p /data/claude/projects /data/goose/sessions /mirror
              while true; do
                s5cmd --endpoint-url "$AGENT_TS_ENDPOINT" sync "s3://agent-transcripts/*" /mirror/ \
                  || echo "bucket sync failed (retrying next tick)"
                # Re-exec the mapper each tick so a ConfigMap edit (transcripts-sync-script.yaml) is
                # picked up without rolling the pod: cwd-rewrite of claude jsonl (FU-061 grouping) +
                # goose sessions.db merge (FU-057 rendering).
                python3 /app/sync.py || echo "sync.py failed (retrying next tick)"
                sleep 300
              done
          env:
            - name: HOME
              value: "/home/node"
            - name: AGENT_TS_ENDPOINT
              value: "http://garage.garage.svc.cluster.local:3900"
            # Read-only bucket key (Workspace conn secret). Not optional — parks until it exists.
            - name: READER_ID
              valueFrom:
                secretKeyRef: { name: agent-transcripts-s3, key: reader_access_key_id }
            - name: READER_SECRET
              valueFrom:
                secretKeyRef: { name: agent-transcripts-s3, key: reader_secret_access_key }
          volumeMounts:
            - { name: claude-data, mountPath: /data/claude }
            - { name: goose-data, mountPath: /data/goose }
            - { name: mirror, mountPath: /mirror }
            - { name: sync-script, mountPath: /app, readOnly: true }
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
          resources:
            requests: { cpu: "25m", memory: "64Mi" }
            # cpu 500m → 1: the per-tick s5cmd sync + sync.py burst ran 81% CPU-throttled
            # (CPUThrottlingHigh, 2026-07-12) — slow mirrors, no benefit from the tight cap.
            limits:   { cpu: "1", memory: "256Mi" }
      volumes:
        - name: claude-data
          emptyDir: {}
        - name: goose-data
          emptyDir: {}
        - name: mirror
          emptyDir: {}
        - name: sync-script
          configMap: { name: transcripts-sync-script }
---
# LAN VIP for the viewer (BGP-advertised; HAProxy terminates TLS for transcripts.local.teststuff.net
# and proxies here — the VIP/hostname pair is registered in SERVICES.md).
apiVersion: v1
kind: Service
metadata:
  name: transcripts-viewer
  namespace: agent-coordinator
  labels:
    app: transcripts-viewer
    bgp: advertise
  annotations:
    lbipam.cilium.io/ips: "192.168.40.19"
spec:
  type: LoadBalancer
  selector:
    app: transcripts-viewer
  ports:
    - { name: http, port: 3727, targetPort: 3727 }
