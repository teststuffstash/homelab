# Model-scout CronJob — the weekly REPORT-ONLY model-discovery reflex (homelab FU-062,
# docs/agents/model-routing.md §M7). Sibling of review-reflex/ledger-reflex: deterministic, costs no
# LLM turn, lives in the coordinator's namespace and reuses the coordinator's identity + secrets.
#
# Each tick clones the current homelab and runs agents/model-scout.sh: diff the live OpenRouter
# /models catalog against the previous snapshot (s3://agent-transcripts/_model-scout/, next to the
# ledger), enrich new tool-capable :free/≤-ceiling models via estimate_budget.py --lookup, and post
# ONE digest issue on homelab. Chain graduation stays a human call; canary dispatch + key minting
# are TODO(FU-062) in the script, gated on FU-024.
#
# ⚠ Deployed SUSPENDED — unsuspend after the first supervised run:
#     kubectl -n agent-coordinator create job --from=cronjob/model-scout model-scout-manual
#   then verify (a) the bootstrap snapshot lands in the bucket, (b) a later manual run posts a sane
#   digest, (c) coordinator-git can `gh issue create` on ORG/homelab (it writes issues on the agent
#   repos; homelab is the one to confirm) — then drop `suspend: true` here via a normal PR.
#
# Prereqs (coordinator bootstrap, README.md §Bootstrap): rbac.yaml SA agent-coordinator,
# coordinator-git, and the agent-transcripts-s3 Secret (reader + writer keys, garage-workspace.yaml).
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: model-scout
  namespace: agent-coordinator
spec:
  schedule: "0 6 * * 1"           # weekly, Monday 06:00 UTC — catalog churn is slow (§M7)
  suspend: false                  # unsuspended 2026-07-16: supervised run passed (a) bootstrap
                                  # snapshot landed, (b) digest posted on a forced diff (homelab#27,
                                  # synthetic — hy3:free removed from the snapshot by hand), (c)
                                  # coordinator-git created the issue. FU-062.
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600   # a missed weekly tick may fire up to an hour late, never doubled
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0             # no retry — next week's tick (or a manual job) is the retry
      activeDeadlineSeconds: 900
      template:
        metadata:
          labels: { app: model-scout }
        spec:
          restartPolicy: Never
          serviceAccountName: agent-coordinator
          terminationGracePeriodSeconds: 5
          securityContext:
            fsGroup: 1000
          # Clone the live homelab so the reflex runs the committed model-scout.sh +
          # estimate_budget.py (public repo — no token needed), like the sibling reflexes.
          initContainers:
            - name: clone-homelab
              image: ghcr.io/teststuffstash/agent-coordinator:2026.7.8-g916d1ef5a81c
              command: ["bash", "-lc"]
              args: ["set -e; rm -rf /work/homelab; git clone --depth 1 -b master https://github.com/teststuffstash/homelab.git /work/homelab"]
              volumeMounts:
                - { name: work, mountPath: /work }
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
                seccompProfile: { type: RuntimeDefault }
              resources:
                requests: { cpu: "100m", memory: "128Mi" }
                limits:   { cpu: "1",    memory: "512Mi" }
          containers:
            - name: scout
              image: ghcr.io/teststuffstash/agent-coordinator:2026.7.8-g916d1ef5a81c
              command: ["bash", "-lc"]
              args: ["exec bash /work/homelab/agents/model-scout.sh"]
              env:
                - name: HOME
                  value: "/home/node"
                - name: ORG
                  value: "teststuffstash"
                - name: DIGEST_REPO
                  value: "homelab"
                - name: PRICE_CEILING   # $/M headline gate for paid newcomers (:free always passes)
                  value: "0.50"
                # gh (one `issue create` per digest). The image's gh-wrapper reads the LIVE ~1h token
                # from GH_TOKEN_FILE (ESO re-mints it); GH_TOKEN env is the frozen fallback.
                - name: GH_TOKEN
                  valueFrom:
                    secretKeyRef: { name: coordinator-git, key: GH_TOKEN, optional: true }
                - name: GH_TOKEN_FILE
                  value: "/var/run/coordinator-git/GH_TOKEN"
                # Snapshot state next to the ledger: reader gets the previous snapshot, the
                # write-only writer puts the advanced one.
                - name: AGENT_TS_ENDPOINT
                  value: "http://garage.garage.svc.cluster.local:3900"
                - name: AGENT_TS_BUCKET
                  value: "agent-transcripts"
                - name: AGENT_TS_READER_ID
                  valueFrom:
                    secretKeyRef: { name: agent-transcripts-s3, key: reader_access_key_id, optional: true }
                - name: AGENT_TS_READER_SECRET
                  valueFrom:
                    secretKeyRef: { name: agent-transcripts-s3, key: reader_secret_access_key, optional: true }
                - name: AGENT_TS_WRITER_ID
                  valueFrom:
                    secretKeyRef: { name: agent-transcripts-s3, key: writer_access_key_id, optional: true }
                - name: AGENT_TS_WRITER_SECRET
                  valueFrom:
                    secretKeyRef: { name: agent-transcripts-s3, key: writer_secret_access_key, optional: true }
              volumeMounts:
                - { name: work, mountPath: /work }
                - { name: coordinator-git, mountPath: /var/run/coordinator-git, readOnly: true }
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
                seccompProfile: { type: RuntimeDefault }
              resources:
                requests: { cpu: "100m", memory: "256Mi" }
                limits:   { cpu: "1",    memory: "512Mi" }
          volumes:
            - name: work
              emptyDir: {}
            - name: coordinator-git
              secret: { secretName: coordinator-git, optional: true }
