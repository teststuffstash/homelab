# The agent-loop reflexes as Argo CronWorkflows (ADR-093 Phase 1) — replacing the k8s CronJobs
# (review-reflex/coordinator-reflex/model-scout/ledger were `kind: CronJob`). Same containers, same
# coordinator SA + secrets; now on Argo, so each tick shows in the argo-server UI + emits
# argo_workflows_* metrics (duration/phase/retry) to Prometheus. The clone-homelab initContainer
# folds into the single step. review-reflex is now the *backstop* (the edge-trigger Sensor +
# exporter POST is the fast path — review-argo.yaml) so it drops to */15. The per-stack split with
# the two knobs (coordinator.enabled off / reviewer.enabled on) is the FU-080 continuation; these
# stay GLOBAL in agent-coordinator until then (model-scout + ledger stay global permanently).
---
# FU-088 Argo layer: the subscription-capacity semaphore. Workflows that HOLD a live subscription
# session (review-reflex tick, coordinator tick, the Sensor-submitted review Workflow — their
# containers run for the session's whole duration) declare this semaphore, so an over-cap
# submission QUEUES ("waiting for lock" in the UI, priority-ordered) instead of spawning into a
# rate-limited account. Complements — never replaces — agents/subscription-latch.sh: Argo counts
# only Argo-run workflows (interactive rides and jail launches are invisible here, and one reflex
# tick may hold K=2 reviewer pods on a single slot), while the latch's proxy verdict + pod-label
# count see ALL subscription traffic. ConfigMap semaphores are namespace-scoped — the FU-080
# per-stack world needs the DB-backed lock flavor or per-stack pools (decide there).
apiVersion: v1
kind: ConfigMap
metadata:
  name: subscription-capacity
  namespace: agent-coordinator
data:
  claude: "3" # keep in step with SUBSCRIPTION_MAX_RUNNING in agents/subscription-latch.sh
---
# Review backstop — level-triggered catch-all for anything the edge-trigger missed (exporter down,
# lost event). The Sensor path handles the common case near-instantly; this only sweeps.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: review-reflex
  namespace: agent-coordinator
spec:
  schedules:
    - "*/15 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 60
  workflowSpec:
    serviceAccountName: agent-coordinator
    activeDeadlineSeconds: 900
    ttlStrategy: { secondsAfterCompletion: 3600, secondsAfterFailure: 86400 }
    # FU-088 Argo layer: queue (not spawn) when the subscription pool is full — see the
    # subscription-capacity ConfigMap header. The tick holds its slot while its reviewers run.
    synchronization:
      semaphores:
        - configMapKeyRef: { name: subscription-capacity, key: claude }
    entrypoint: main
    volumes:
      - { name: work, emptyDir: {} }
      - { name: coordinator-git, secret: { secretName: coordinator-git, optional: true } }
    templates:
      - name: main
        container:
          image: ghcr.io/teststuffstash/agent-coordinator:2026.7.8-g916d1ef5a81c
          command: ["bash", "-lc"]
          args:
            - |
              set -e
              rm -rf /work/homelab
              git clone --depth 1 -b master https://github.com/teststuffstash/homelab.git /work/homelab
              exec bash /work/homelab/agents/review-reflex.sh
          env:
            - { name: HOME, value: "/home/node" }
            - { name: ORG, value: "teststuffstash" }
            - { name: REVIEW_CONCURRENCY, value: "2" }
            - name: GH_TOKEN
              valueFrom: { secretKeyRef: { name: coordinator-git, key: GH_TOKEN, optional: true } }
            - { name: GH_TOKEN_FILE, value: "/var/run/coordinator-git/GH_TOKEN" }
          volumeMounts:
            - { name: work, mountPath: /work }
            - { name: coordinator-git, mountPath: /var/run/coordinator-git, readOnly: true }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { memory: "512Mi" }
---
# Coordinator tick — the LLM sibling (dispatches workers, spends budget). UNSUSPENDED 2026-07-17
# (operator, meta-7): the FU-050 switch is now the per-stack FU-080 knob — the scan spawns ONLY
# for stacks whose claim sets coordinator.enabled=true (oracle first; sleep/platform stay off).
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: coordinator-reflex
  namespace: agent-coordinator
spec:
  schedules:
    - "*/10 * * * *"
  suspend: false # per-stack autonomy via claim coordinator.enabled (FU-080); global kill switch stays here
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 60
  # FU-085 refactor: the scan container lives in the `coordinate` WorkflowTemplate
  # (coordinate-argo.yaml) — this cron is the level-triggered BACKSTOP, the /coordinate Sensor is
  # the edge. The template carries the FU-088 semaphore + the coordinator-scan mutex (Forbid
  # doesn't see Sensor submissions). Demote */10 → */30 once the edge proves itself in live use.
  workflowSpec:
    workflowTemplateRef: { name: coordinate }
---
# Model scout — weekly catalog diff + canary (FU-062). GLOBAL (fleet-wide by nature).
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: model-scout
  namespace: agent-coordinator
spec:
  schedules:
    - "0 6 * * 1" # weekly, Monday 06:00 UTC
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  workflowSpec:
    serviceAccountName: agent-coordinator
    activeDeadlineSeconds: 1800
    ttlStrategy: { secondsAfterCompletion: 86400, secondsAfterFailure: 86400 }
    entrypoint: main
    volumes:
      - { name: work, emptyDir: {} }
      - { name: coordinator-git, secret: { secretName: coordinator-git, optional: true } }
    templates:
      - name: main
        container:
          image: ghcr.io/teststuffstash/agent-coordinator:2026.7.8-g916d1ef5a81c
          command: ["bash", "-lc"]
          args:
            - |
              set -e
              rm -rf /work/homelab
              git clone --depth 1 -b master https://github.com/teststuffstash/homelab.git /work/homelab
              exec bash /work/homelab/agents/model-scout.sh
          env:
            - { name: HOME, value: "/home/node" }
            - { name: ORG, value: "teststuffstash" }
            - { name: DIGEST_REPO, value: "homelab" }
            - { name: PRICE_CEILING, value: "0.50" }
            - name: GH_TOKEN
              valueFrom: { secretKeyRef: { name: coordinator-git, key: GH_TOKEN, optional: true } }
            - { name: GH_TOKEN_FILE, value: "/var/run/coordinator-git/GH_TOKEN" }
            - { name: AGENT_TS_ENDPOINT, value: "http://garage.garage.svc.cluster.local:3900" }
            - { name: AGENT_TS_BUCKET, value: "agent-transcripts" }
            - name: AGENT_TS_READER_ID
              valueFrom: { secretKeyRef: { name: agent-transcripts-s3, key: reader_access_key_id, optional: true } }
            - name: AGENT_TS_READER_SECRET
              valueFrom: { secretKeyRef: { name: agent-transcripts-s3, key: reader_secret_access_key, optional: true } }
            - name: AGENT_TS_WRITER_ID
              valueFrom: { secretKeyRef: { name: agent-transcripts-s3, key: writer_access_key_id, optional: true } }
            - name: AGENT_TS_WRITER_SECRET
              valueFrom: { secretKeyRef: { name: agent-transcripts-s3, key: writer_secret_access_key, optional: true } }
          volumeMounts:
            - { name: work, mountPath: /work }
            - { name: coordinator-git, mountPath: /var/run/coordinator-git, readOnly: true }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { memory: "512Mi" }
---
