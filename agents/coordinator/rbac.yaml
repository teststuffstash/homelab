# Scoped identity for the coordinator pod. It runs in its own namespace and talks to the cluster via
# this ServiceAccount (in-cluster config — no kubeconfig file in the pod). The grant is exactly the
# coordinator's job: spawn/observe agent worker pods in project namespaces, and mint/observe/delete
# the ephemeral per-session OpenRouterKey CRs. Deliberately NO access to Secret *values* — it waits
# on the OpenRouterKey `.status` (the operator stamps the hash when minted), never reads the key.
#
#   kubectl --kubeconfig tofu/kubeconfig apply -f agents/coordinator/rbac.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: agent-coordinator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-coordinator
  namespace: agent-coordinator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-coordinator
rules:
  # Spawn + observe worker pods (agent-session.sh creates Pods in the project namespace).
  - apiGroups: [""]
    resources: [pods, pods/log]
    verbs: [get, list, watch, create, delete]
  # Attach to an interactive worker (agent-session.sh exec). Drop if only headless --run is used.
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create]
  # Discover project namespaces.
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list]
  # agent-session.sh docker mode resolves in-cluster ENDPOINT IPs (FU-072 kata workaround:
  # openrouter-proxy/garage/pushgateway rewrites). Without this an IN-CLUSTER dispatcher's
  # resolve_ep 403s → kata rides ship raw svc URLs → ConnectionRefused (found live meta-8,
  # oracle-fleet#52 r1 strike). Read-only.
  - apiGroups: [""]
    resources: [endpoints]
    verbs: [get, list]
  # agent-session.sh probes for the optional agent-uv-cache PVC to decide whether to mount the shared
  # uv wheel cache. Without this read the probe 403s, the mount is skipped, and (pre-fix) UV_CACHE_DIR
  # pointed at an unmounted /uv-cache the worker couldn't write. Read-only.
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get, list]
  # Mint / observe / clean up ephemeral per-session budget keys. status: wait for the minted hash
  # instead of reading the Secret value.
  - apiGroups: [openrouter.teststuff.net]
    resources: [openrouterkeys, openrouterkeys/status]
    verbs: [get, list, watch, create, update, patch, delete]
  # FU-048: coordinator-scan reads AgentStack claims — the stack-list source of truth (a failed
  # read PROBE-FAILS back to agents/stacks.json; grant this or the reflex runs on the belt forever).
  - apiGroups: [platform.teststuff.net]
    resources: [agentstacks]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-coordinator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-coordinator
subjects:
  - kind: ServiceAccount
    name: agent-coordinator
    namespace: agent-coordinator
# (The former "one deliberate exception" — a get on the agent-transcripts-s3 Secret for
# agent-session.sh's cross-namespace env-value injection — was REMOVED 2026-07-17, FU-080 a:
# the AgentStack Composition now mirrors the write-only key into each fixer namespace via the
# `agent-transcripts` ClusterSecretStore, and worker pods secretKeyRef it in-ns. No launcher
# reads Secret values anymore; this SA has zero secret access.)
