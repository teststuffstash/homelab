# Scoped identity for the coordinator pod. It runs in its own namespace and talks to the cluster via
# this ServiceAccount (in-cluster config — no kubeconfig file in the pod). The grant is exactly the
# coordinator's job: spawn/observe agent worker pods in project namespaces, and mint/observe/delete
# the ephemeral per-session OpenRouterKey CRs. Deliberately NO access to Secret *values* — it waits
# on the OpenRouterKey `.status` (the operator stamps the hash when minted), never reads the key.
#
#   kubectl --kubeconfig tofu/kubeconfig apply -f agents/coordinator/rbac.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: agent-coordinator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-coordinator
  namespace: agent-coordinator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-coordinator
rules:
  # Spawn + observe worker pods (agent-session.sh creates Pods in the project namespace).
  - apiGroups: [""]
    resources: [pods, pods/log]
    verbs: [get, list, watch, create, delete]
  # Attach to an interactive worker (agent-session.sh exec). Drop if only headless --run is used.
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create]
  # Discover project namespaces.
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list]
  # agent-session.sh probes for the optional agent-uv-cache PVC to decide whether to mount the shared
  # uv wheel cache. Without this read the probe 403s, the mount is skipped, and (pre-fix) UV_CACHE_DIR
  # pointed at an unmounted /uv-cache the worker couldn't write. Read-only.
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get, list]
  # Mint / observe / clean up ephemeral per-session budget keys. status: wait for the minted hash
  # instead of reading the Secret value.
  - apiGroups: [openrouter.teststuff.net]
    resources: [openrouterkeys, openrouterkeys/status]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-coordinator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-coordinator
subjects:
  - kind: ServiceAccount
    name: agent-coordinator
    namespace: agent-coordinator
---
# The ONE deliberate exception to "no Secret values": the transcript-capture WRITE-ONLY S3 key
# (docs/agents/observability-and-retro.md §A1). agent-session.sh injects it into worker pods as
# env VALUES (a cross-namespace secretKeyRef is impossible — workers run in project namespaces,
# the key lives here in agent-coordinator), so a coordinator-dispatched worker needs the launcher
# to read it. Scoped to exactly this Secret by resourceNames, get-only; the writer key it carries
# can only append to the agent-transcripts bucket (no list/get), so holding it grants nothing
# beyond writing more exhaust. Everything else stays unreadable (the ClusterRole above still
# grants no secret access).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-transcripts-key-reader
  namespace: agent-coordinator
rules:
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [agent-transcripts-s3]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-transcripts-key-reader
  namespace: agent-coordinator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agent-transcripts-key-reader
subjects:
  - kind: ServiceAccount
    name: agent-coordinator
    namespace: agent-coordinator
