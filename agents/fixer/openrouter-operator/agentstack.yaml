# The platform stack's AgentStack claim (FU-048/ADR-085) — openrouter-operator's agent POLICY in
# one CR; the XRD+Composition render the fixer MECHANISM that openrouter-key.yaml + git-token.yaml
# in this dir carried by hand. The platform stack has no -iac repo, so its claim lives here
# (homelab IS its deployment truth); applied by the same agent-fixer ApplicationSet dir generator.
apiVersion: platform.teststuff.net/v1alpha1
kind: AgentStack
metadata:
  name: platform
spec:
  mainRepo: homelab
  coordinatorModel: opus # platform coordination = highest-stakes arbitration (stacks.json carry-over)
  workerModel: openrouter/deepseek/deepseek-v4-flash
  workerModelFallbacks: [tencent/hy3, qwen/qwen3-coder]
  repos:
    # Platform-image repos, context-only (FU-052 "still to onboard", visibility half done
    # 2026-07-16): the review-reflex derives its scan set from the stack claims, so agent PRs
    # here were invisible until a human dispatched the reviewer by hand (found live on
    # agent-runtime#14). No fixer: these build the agent images; workers don't run pods in them.
    # labels: {} = claim-owned label set (FU-068, taxonomy only) — tofu label_repos handoff via
    # `tofu state rm` like the oracle repos.
    - name: agent-runtime
      labels: { extra: [] } # explicit (server default) — bare {} gets stamped to {extra: []}, ArgoCD drifts
    - name: agent-coordinator
      labels: { extra: [] }
    - name: openrouter-operator
      labels: { extra: [] } # claim-owned label set (FU-068; live diff 2026-07-16: strict taxonomy subset)
      fixer:
        budgetUSD: 5 # USD/week standing ceiling (carried over)
        resetInterval: weekly
        guardrail: only-free
        # explicit (server defaults) — the API server stamps defaulted booleans into the stored
        # object, so omitting them leaves the ArgoCD app permanently OutOfSync (same rule as
        # extraFQDNs below; observed live 2026-07-16 when claudeTier's default landed).
        docker: false
        claudeTier: false
        egress:
          profile: python # kopf operator, uv/pip toolchain
          extraFQDNs: [] # explicit (server default) — earned from a harvest, currently none; also keeps ArgoCD diff clean
          # MONITOR (FU-020 rollout ring 1) — flip to true after clean harvested rides.
          enforce: false
