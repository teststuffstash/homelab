---
# OPNsense FRR/BGP peering with Cilium. Thin role-caller — logic in
# roles/opnsense-bgp, config in group_vars/opnsense.yml.
# Run: bash scripts/opnsense-playbook.sh ansible/opnsense-bgp.yml
- name: OPNsense BGP peering with Cilium
  hosts: opnsense
  gather_facts: false
  module_defaults:
    oxlorg.opnsense.frr_general: "{{ opnsense_conn }}"
    oxlorg.opnsense.frr_bgp_general: "{{ opnsense_conn }}"
    oxlorg.opnsense.frr_bgp_route_map: "{{ opnsense_conn }}"
    oxlorg.opnsense.frr_bgp_neighbor: "{{ opnsense_conn }}"
  roles:
    - opnsense-bgp
