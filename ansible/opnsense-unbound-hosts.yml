# OPNsense Unbound — static LAN host overrides (config-as-code).
#
# Home for hand-made Unbound host overrides that are NOT created by another playbook.
# (Per-service names for HAProxy-proxied backends are managed in opnsense-haproxy.yml;
# don't duplicate those here.)
#
# `ubiquiti.teststuff.net` was a legacy override pointing at the dead T61 (192.168.2.2)
# that lived only in the OPNsense UI — never in git. It's captured here and repointed
# at the UniFi Network Application's BGP LoadBalancer VIP (tofu/unifi.tf, .40.12). The
# name resolves straight to the controller VIP (not an HAProxy frontend) so that device
# adoption works: APs/switches inform on http://ubiquiti.teststuff.net:8080/inform, and
# :8080 must reach the controller directly. The GUI is the controller's self-signed cert
# on :8443.
#
# match_fields deliberately EXCLUDES `value`: matching on hostname+domain+record_type
# updates the existing record in place (the repoint) instead of appending a duplicate.
#
# NOTE: the unbound_host module saves the record but does NOT apply it — Unbound keeps
# serving the old answer until reconfigured. The handler below forces that apply.
#
# Run from the jail (verified recipe — see [[jail-ops-gotchas]]):
#   ansible-galaxy collection install -r ansible/collections/requirements.yml   # once
#   export OPN_API_KEY=$(cat ~/.claude/homelab-opnsense/key)
#   export OPN_API_SECRET=$(cat ~/.claude/homelab-opnsense/secret)
#   export NIX_CONFIG="experimental-features = nix-command flakes"
#   PYBIN=$(nix build --no-link --print-out-paths path:./ansible/controller-env)/bin/python3
#   # devbox run drops ANSIBLE_PYTHON_INTERPRETER → MUST pass the interpreter as -e:
#   devbox run -- ansible-playbook ansible/opnsense-unbound-hosts.yml \
#     -e ansible_python_interpreter="$PYBIN"
- name: OPNsense Unbound static host overrides
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    unbound_hosts:
      # name → IP. UniFi Network Application controller VIP (tofu/unifi.tf).
      - { hostname: ubiquiti, domain: teststuff.net, value: 192.168.40.12, description: "UniFi Network Application (controller VIP)" }
    opnsense_conn: &conn
      firewall: "192.168.2.1"
      api_key: "{{ lookup('env', 'OPN_API_KEY') }}"
      api_secret: "{{ lookup('env', 'OPN_API_SECRET') }}"
      ssl_verify: false
  module_defaults:
    oxlorg.opnsense.unbound_host: *conn
    oxlorg.opnsense.raw: *conn

  handlers:
    # unbound_host saves but does not apply — reconfigure to flush + serve the new answer.
    # raw mutating commands need action:post (defaults to get → silently no-ops).
    - name: reconfigure unbound
      oxlorg.opnsense.raw: { module: unbound, controller: service, command: reconfigure, action: post }

  tasks:
    - name: Unbound host override per entry
      oxlorg.opnsense.unbound_host:
        hostname: "{{ item.hostname }}"
        domain: "{{ item.domain }}"
        record_type: A
        value: "{{ item.value }}"
        description: "{{ item.description }}"
        # exclude `value` → update-in-place on repoint, no duplicate record
        match_fields: [hostname, domain, record_type]
      loop: "{{ unbound_hosts }}"
      loop_control: { label: "{{ item.hostname }}.{{ item.domain }} -> {{ item.value }}" }
      notify: reconfigure unbound
