---
# Matchbox proxy-DHCP boot server. Thin role-caller — logic in
# roles/matchbox-proxydhcp, config in group_vars/matchbox.yml.
# Run: devbox run -- ansible-playbook ansible/matchbox-proxydhcp.yml
- name: Matchbox proxy-DHCP boot server
  hosts: matchbox
  gather_facts: false
  roles:
    - matchbox-proxydhcp
