# Stage-1 of the PXE chainload on the Matchbox LXC: a TFTP server handing vanilla
# iPXE binaries to PXE ROMs, plus the entry script iPXE then runs.
#
#   ansible-playbook -i '192.168.2.30,' ansible/matchbox-ipxe-tftp.yml
#
# Flow (driven by OPNsense dnsmasq):
#   PXE ROM      -> TFTP .30 -> undionly.kpxe (BIOS) / ipxe.efi (UEFI)
#   iPXE (opt175)-> HTTP http://192.168.2.30:8080/assets/boot-or-disk.ipxe
#     boot-or-disk.ipxe: chain Matchbox /ipxe; on no-match (404) -> exit -> local disk.
- name: Matchbox iPXE TFTP (PXE stage-1)
  hosts: all
  gather_facts: false
  remote_user: root
  vars:
    ansible_ssh_private_key_file: /home/node/.claude/homelab-pve-ssh/id_ed25519
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
    tftp_root: /srv/tftp
    matchbox_assets: /var/lib/matchbox/assets
    matchbox_http: http://192.168.2.30:8080

  tasks:
    - name: Install tftpd-hpa + iPXE binaries (Debian-packaged, pinned/reproducible)
      ansible.builtin.apt:
        name:
          - tftpd-hpa
          - ipxe       # provides /usr/lib/ipxe/{undionly.kpxe,snponly.efi} + /boot/ipxe.efi
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Create TFTP root
      ansible.builtin.file:
        path: "{{ tftp_root }}"
        state: directory
        owner: tftp
        group: tftp
        mode: "0755"

    - name: Install iPXE binaries into TFTP root
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ tftp_root }}/{{ item.dst }}"
        remote_src: true
        owner: tftp
        group: tftp
        mode: "0644"
      loop:
        - { src: /usr/lib/ipxe/undionly.kpxe, dst: undionly.kpxe } # BIOS / legacy PXE
        - { src: /boot/ipxe.efi, dst: ipxe.efi }                   # UEFI (ipxe.efi is a symlink here)
        - { src: /usr/lib/ipxe/snponly.efi, dst: snponly.efi }     # UEFI via SNP (fallback)

    - name: Configure tftpd-hpa
      ansible.builtin.copy:
        dest: /etc/default/tftpd-hpa
        owner: root
        group: root
        mode: "0644"
        content: |
          TFTP_USERNAME="tftp"
          TFTP_DIRECTORY="{{ tftp_root }}"
          TFTP_ADDRESS=":69"
          TFTP_OPTIONS="--secure"
      notify: Restart tftpd

    - name: Entry script — chain Matchbox, else boot local disk
      ansible.builtin.copy:
        dest: "{{ matchbox_assets }}/boot-or-disk.ipxe"
        owner: matchbox
        group: matchbox
        mode: "0644"
        content: |
          #!ipxe
          chain {{ matchbox_http }}/ipxe?mac=${mac:hexhyp} || exit

    - name: Enable and start tftpd-hpa
      ansible.builtin.systemd:
        name: tftpd-hpa
        enabled: true
        state: started

  handlers:
    - name: Restart tftpd
      ansible.builtin.systemd:
        name: tftpd-hpa
        state: restarted
