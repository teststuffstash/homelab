---
# Matchbox iPXE TFTP (PXE stage-1). Thin role-caller — logic in
# roles/matchbox-ipxe-tftp, config in group_vars/matchbox.yml.
# Run: devbox run -- ansible-playbook ansible/matchbox-ipxe-tftp.yml
- name: Matchbox iPXE TFTP (PXE stage-1)
  hosts: matchbox
  gather_facts: false
  roles:
    - matchbox-ipxe-tftp
