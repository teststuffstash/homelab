# Install Matchbox onto the provisioning LXC created by tofu/provisioning/.
#
#   ansible-playbook -i '192.168.2.30,' ansible/matchbox.yml
#
# Matchbox serves the per-MAC PXE boot decision (ROADMAP "provisioning model"):
#   - HTTP  :8080  read-only API + assets (iPXE scripts, kernels, Talos images)
#   - gRPC  :8081  TLS+client-cert API used by the poseidon/matchbox Tofu provider
#                  to push profiles/groups (next phase). Certs generated here.
#
# Connection defaults (override on the CLI if needed):
#   ANSIBLE_HOST_KEY_CHECKING is disabled below; root login via the pve seed key.
- name: Matchbox provisioning server
  hosts: all
  gather_facts: false
  remote_user: root
  vars:
    ansible_ssh_private_key_file: /home/node/.claude/homelab-pve-ssh/id_ed25519
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
    matchbox_version: v0.11.0
    matchbox_sha256: a341c73ac6415a3305111def40f30530c05a92064b58844527674b65d6d37545
    matchbox_arch: linux-amd64
    # SANs baked into the gRPC server cert. IP = container IP; add a DNS name if you
    # later give Matchbox a hostname in OPNsense Unbound.
    matchbox_san: "IP.1:{{ ansible_host | default(inventory_hostname) }},DNS.1:matchbox,DNS.2:matchbox.teststuff.net"
    matchbox_data_dir: /var/lib/matchbox
    matchbox_tls_dir: /etc/matchbox
    # Where to drop the generated CLIENT certs on the controller (the jail) so the
    # tofu poseidon/matchbox provider can authenticate to gRPC. Outside the repo.
    client_cert_dest: /home/node/.claude/homelab-matchbox

  pre_tasks:
    # Debian 'standard' LXC template may lack python3 — bootstrap it for ansible.
    - name: Bootstrap python3 (raw, pre-facts)
      ansible.builtin.raw: command -v python3 || (apt-get update && apt-get install -y python3)
      changed_when: false

    - name: Gather facts
      ansible.builtin.setup:

  tasks:
    - name: Ensure openssl present (for cert-gen)
      ansible.builtin.apt:
        name: openssl
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Create matchbox system group
      ansible.builtin.group:
        name: matchbox
        system: true

    - name: Create matchbox system user
      ansible.builtin.user:
        name: matchbox
        group: matchbox
        system: true
        home: "{{ matchbox_data_dir }}"
        shell: /usr/sbin/nologin
        create_home: false

    - name: Create matchbox directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: matchbox
        group: matchbox
        mode: "0755"
      loop:
        - "{{ matchbox_data_dir }}"
        - "{{ matchbox_data_dir }}/assets"
        - "{{ matchbox_data_dir }}/groups"
        - "{{ matchbox_data_dir }}/profiles"
        - "{{ matchbox_data_dir }}/ignition"
        - "{{ matchbox_data_dir }}/cloud"
        - "{{ matchbox_data_dir }}/generic"
        - "{{ matchbox_data_dir }}/templates"

    - name: Create TLS dir
      ansible.builtin.file:
        path: "{{ matchbox_tls_dir }}"
        state: directory
        owner: matchbox
        group: matchbox
        mode: "0750"

    - name: Download matchbox release
      ansible.builtin.get_url:
        url: "https://github.com/poseidon/matchbox/releases/download/{{ matchbox_version }}/matchbox-{{ matchbox_version }}-{{ matchbox_arch }}.tar.gz"
        dest: "/tmp/matchbox-{{ matchbox_version }}.tar.gz"
        checksum: "sha256:{{ matchbox_sha256 }}"
        mode: "0644"

    - name: Extract matchbox
      ansible.builtin.unarchive:
        src: "/tmp/matchbox-{{ matchbox_version }}.tar.gz"
        dest: /tmp
        remote_src: true
        creates: "/tmp/matchbox-{{ matchbox_version }}-{{ matchbox_arch }}/matchbox"

    - name: Install matchbox binary
      ansible.builtin.copy:
        src: "/tmp/matchbox-{{ matchbox_version }}-{{ matchbox_arch }}/matchbox"
        dest: /usr/local/bin/matchbox
        remote_src: true
        owner: root
        group: root
        mode: "0755"
      notify: Restart matchbox

    # --- TLS: use the bundled cert-gen (ca + server + client) ------------------
    - name: Check whether server cert already exists
      ansible.builtin.stat:
        path: "{{ matchbox_tls_dir }}/server.crt"
      register: server_crt

    - name: Generate TLS assets via bundled cert-gen
      ansible.builtin.shell:
        cmd: SAN="{{ matchbox_san }}" ./cert-gen
        chdir: "/tmp/matchbox-{{ matchbox_version }}-{{ matchbox_arch }}/scripts/tls"
      when: not server_crt.stat.exists

    - name: Install server + CA certs into TLS dir
      ansible.builtin.copy:
        src: "/tmp/matchbox-{{ matchbox_version }}-{{ matchbox_arch }}/scripts/tls/{{ item.f }}"
        dest: "{{ matchbox_tls_dir }}/{{ item.f }}"
        remote_src: true
        owner: matchbox
        group: matchbox
        mode: "{{ item.m }}"
      loop:
        - { f: ca.crt, m: "0644" }
        - { f: server.crt, m: "0644" }
        - { f: server.key, m: "0600" }
      when: not server_crt.stat.exists
      notify: Restart matchbox

    - name: Fetch CLIENT certs to the controller (for the tofu provider)
      ansible.builtin.fetch:
        src: "/tmp/matchbox-{{ matchbox_version }}-{{ matchbox_arch }}/scripts/tls/{{ item }}"
        dest: "{{ client_cert_dest }}/{{ item }}"
        flat: true
      loop:
        - ca.crt
        - client.crt
        - client.key
      when: not server_crt.stat.exists

    - name: Install systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/matchbox.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Matchbox Server
          Documentation=https://github.com/poseidon/matchbox
          Requires=network-online.target
          After=network-online.target

          [Service]
          User=matchbox
          Group=matchbox
          ExecStart=/usr/local/bin/matchbox \
            -address=0.0.0.0:8080 \
            -rpc-address=0.0.0.0:8081 \
            -data-path={{ matchbox_data_dir }} \
            -assets-path={{ matchbox_data_dir }}/assets \
            -log-level=info
          Restart=on-failure
          RestartSec=2

          [Install]
          WantedBy=multi-user.target
      notify: Restart matchbox

    - name: Enable and start matchbox
      ansible.builtin.systemd:
        name: matchbox
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Restart matchbox
      ansible.builtin.systemd:
        name: matchbox
        state: restarted
        daemon_reload: true
