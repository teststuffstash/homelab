---
# Install Matchbox onto the provisioning LXC. Thin role-caller — logic in
# roles/matchbox, config (incl. SSH connection) in group_vars/matchbox.yml.
# Run: devbox run -- ansible-playbook ansible/matchbox.yml   (ANSIBLE_CONFIG=ansible/ansible.cfg)
- name: Matchbox provisioning server
  hosts: matchbox
  gather_facts: false
  roles:
    - matchbox
