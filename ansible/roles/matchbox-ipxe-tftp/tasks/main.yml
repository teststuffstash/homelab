---
# Stage-1 of the PXE chainload on the Matchbox LXC: a TFTP server handing vanilla
# iPXE binaries to PXE ROMs, plus the entry script iPXE then runs.
# (NOTE: the matchbox-proxydhcp role later makes dnsmasq own TFTP and masks
# tftpd-hpa — this role is kept for the standalone-tftpd setup / reference.)
# Config in group_vars/matchbox.yml.

- name: Install tftpd-hpa + iPXE binaries (Debian-packaged, pinned/reproducible)
  ansible.builtin.apt:
    name:
      - tftpd-hpa
      - ipxe       # provides /usr/lib/ipxe/{undionly.kpxe,snponly.efi} + /boot/ipxe.efi
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create TFTP root
  ansible.builtin.file:
    path: "{{ tftp_root }}"
    state: directory
    owner: tftp
    group: tftp
    mode: "0755"

- name: Install iPXE binaries into TFTP root
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ tftp_root }}/{{ item.dst }}"
    remote_src: true
    owner: tftp
    group: tftp
    mode: "0644"
  loop:
    - { src: /usr/lib/ipxe/undionly.kpxe, dst: undionly.kpxe } # BIOS / legacy PXE
    - { src: /boot/ipxe.efi, dst: ipxe.efi }                   # UEFI (ipxe.efi is a symlink here)
    - { src: /usr/lib/ipxe/snponly.efi, dst: snponly.efi }     # UEFI via SNP (fallback)

- name: Configure tftpd-hpa
  ansible.builtin.copy:
    dest: /etc/default/tftpd-hpa
    owner: root
    group: root
    mode: "0644"
    content: |
      TFTP_USERNAME="tftp"
      TFTP_DIRECTORY="{{ tftp_root }}"
      TFTP_ADDRESS=":69"
      TFTP_OPTIONS="--secure"
  notify: Restart tftpd

- name: Entry script — chain Matchbox, else boot local disk
  ansible.builtin.copy:
    dest: "{{ matchbox_assets }}/boot-or-disk.ipxe"
    owner: matchbox
    group: matchbox
    mode: "0644"
    content: |
      #!ipxe
      chain {{ matchbox_http }}/ipxe?mac=${mac:hexhyp} || exit

- name: Enable and start tftpd-hpa
  ansible.builtin.systemd:
    name: tftpd-hpa
    enabled: true
    state: started
