---
# OPNsense FRR/BGP — peer with the Cilium cluster so LoadBalancer service IPs
# (192.168.40.0/24, advertised by Cilium) become routable on the LAN.
# Config (ASNs, node IPs) is in group_vars/opnsense.yml. The connection comes from
# module_defaults set in the calling playbook (ansible/opnsense-bgp.yml).
#
# Prereq: the os-frr plugin must be INSTALLED on OPNsense (the frr_* modules
# configure it; they don't install it).

- name: Enable FRR
  oxlorg.opnsense.frr_general:
    enabled: true

- name: "Enable BGP (AS {{ opnsense_asn }})"
  oxlorg.opnsense.frr_bgp_general:
    enabled: true
    as_number: "{{ opnsense_asn }}"
    router_id: "{{ bgp_router_id }}"
    # We only need to ACCEPT the cluster's advertised LB routes; nothing to originate.

# FRR defaults to `bgp ebgp-requires-policy`: an eBGP peer with no inbound route-map
# has ALL received routes filtered. A permit-all route-map (no match conditions)
# attached inbound lets us accept the cluster's 192.168.40.0/24 LB routes. We
# originate nothing, so no outbound policy is needed.
- name: Permit-all route-map (satisfies ebgp-requires-policy)
  oxlorg.opnsense.frr_bgp_route_map:
    name: CILIUM-ALLOW-ALL
    action: permit
    id: 10

- name: "BGP neighbor per Talos node (remote AS {{ cluster_asn }})"
  oxlorg.opnsense.frr_bgp_neighbor:
    peer_ip: "{{ item }}"
    remote_as: "{{ cluster_asn }}"
    route_map_in: CILIUM-ALLOW-ALL
    enabled: true
    # Match existing neighbors on peer IP alone. The default ['ip','description']
    # never matches here (we set no description -> desired None vs stored '') so the
    # module would append a duplicate neighbor on every run.
    match_fields: ['ip']
  loop: "{{ bgp_node_ips }}"
