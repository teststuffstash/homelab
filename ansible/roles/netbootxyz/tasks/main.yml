

- name: be sure config directory exists
  ansible.builtin.file:
    path: /home/rasmus/etc/netbootxyz/config
    state: directory
    mode: '0755'

- name: be sure config directory exists
  ansible.builtin.file:
    path: /home/rasmus/etc/netbootxyz/assets
    state: directory
    mode: '0755'
  
- name: Pull the netbootxyz image
  docker_image:
    name: ghcr.io/netbootxyz/netbootxyz:0.7.3-nbxyz2
    source: pull

- name: Start netbootxyz container
  docker_container:
    name: netbootxyz
    image: ghcr.io/netbootxyz/netbootxyz:0.7.3-nbxyz2
    env:
      NGINX_PORT: "80"
      WEB_APP_PORT: "3000"
    volumes:
      - /home/rasmus/etc/netoobtxyz/config:/config
      - /home/rasmus/etc/netoobtxyz/assets:/assets
    published_ports:
      - "3000:3000"
      - "69:69/udp"
      - "80:80"
    restart_policy: unless-stopped