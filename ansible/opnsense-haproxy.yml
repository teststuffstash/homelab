---
# OPNsense HAProxy reverse proxy (cluster services). Thin role-caller — logic in
# roles/opnsense-haproxy, config in group_vars/opnsense.yml.
# Issue the certs via ansible/opnsense-acme.yml first.
# Run: bash scripts/opnsense-playbook.sh ansible/opnsense-haproxy.yml
- name: OPNsense HAProxy reverse proxy (cluster services)
  hosts: opnsense
  gather_facts: false
  module_defaults:
    oxlorg.opnsense.interface_vip: "{{ opnsense_conn }}"
    oxlorg.opnsense.unbound_host: "{{ opnsense_conn }}"
    oxlorg.opnsense.raw: "{{ opnsense_conn }}"
  roles:
    - opnsense-haproxy
