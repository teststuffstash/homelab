# Download Talos PXE boot assets (kernel + initramfs) into Matchbox's asset store,
# so the talos-worker profile boots from the LAN (offline of factory.talos.dev at
# boot time, and fast).
#
#   ansible-playbook -i '192.168.2.30,' ansible/matchbox-talos-assets.yml
#
# The schematic_id selects which system extensions are baked into the initramfs.
# This one = siderolabs/iscsi-tools + util-linux-tools (needed by Longhorn later).
# Regenerate it at https://factory.talos.dev if you change extensions, and bump
# talos_version in lockstep with tofu/ (var.talos_version).
- name: Matchbox Talos PXE assets
  hosts: all
  gather_facts: false
  remote_user: root
  vars:
    ansible_ssh_private_key_file: /home/node/.claude/homelab-pve-ssh/id_ed25519
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
    talos_version: v1.13.2
    talos_schematic_id: 613e1592b2da41ae5e265e8789429f22e121aab91cb4deb6bc3c0b6262961245
    talos_arch: amd64
    matchbox_assets: /var/lib/matchbox/assets
    factory_base: "https://factory.talos.dev/image"

  tasks:
    - name: Create versioned asset dir
      ansible.builtin.file:
        path: "{{ matchbox_assets }}/talos/{{ talos_version }}"
        state: directory
        owner: matchbox
        group: matchbox
        mode: "0755"

    - name: Download Talos kernel
      ansible.builtin.get_url:
        url: "{{ factory_base }}/{{ talos_schematic_id }}/{{ talos_version }}/kernel-{{ talos_arch }}"
        dest: "{{ matchbox_assets }}/talos/{{ talos_version }}/vmlinuz-{{ talos_arch }}"
        owner: matchbox
        group: matchbox
        mode: "0644"

    - name: Download Talos initramfs
      ansible.builtin.get_url:
        url: "{{ factory_base }}/{{ talos_schematic_id }}/{{ talos_version }}/initramfs-{{ talos_arch }}.xz"
        dest: "{{ matchbox_assets }}/talos/{{ talos_version }}/initramfs-{{ talos_arch }}.xz"
        owner: matchbox
        group: matchbox
        mode: "0644"
