---
# Matchbox Talos PXE assets (kernel + initramfs). Thin role-caller — logic in
# roles/matchbox-talos-assets, config in group_vars/matchbox.yml.
# Run: devbox run -- ansible-playbook ansible/matchbox-talos-assets.yml
- name: Matchbox Talos PXE assets
  hosts: matchbox
  gather_facts: false
  roles:
    - matchbox-talos-assets
