---
collections:
  # Manage OPNsense via its API as code (FRR/BGP, and more later).
  # https://github.com/O-X-L/ansible-opnsense
  #
  # PINNED to 25.7.8 — matches the os-frr 1.52 plugin on OPNsense 26.1. This
  # collection's frr_bgp_neighbor expects a `remote_as_mode` field (and bgp_general
  # a `redistribute` field) that the os-frr 1.52 API emits.
  #
  # History: while on OPNsense 24.7 (os-frr 1.42) we had to pin the predecessor
  # ansibleguy.opnsense==1.2.13 because those fields did NOT exist yet and the
  # newer modules crashed ("Failed to translate API entry"). After upgrading to
  # 26.1 the schema gained those fields, so 1.2.13 broke the other way and we moved
  # to oxlorg 25.7.8. Lesson: keep this pin aligned with the OPNsense/os-frr version.
  - name: oxlorg.opnsense
    version: "25.7.8"
