---
# OPNsense ddclient (os-ddclient, native backend) — keeps wg.teststuff.net on the
# dynamic Telia WAN IP (ADR-090). Thin role-caller — logic in
# roles/opnsense-ddclient, config in group_vars/opnsense.yml.
# First run needs the Cloudflare DNS token in the env (same token ACME uses):
#   source scripts/keepass-env.sh   # exports ACME_CF_TOKEN (wallet: cloudflare-acme-token)
#   bash scripts/opnsense-playbook.sh ansible/opnsense-ddclient.yml
- name: OPNsense ddclient (dynamic DNS for the WireGuard endpoint)
  hosts: opnsense
  gather_facts: false
  module_defaults:
    oxlorg.opnsense.raw: "{{ opnsense_conn }}"
  roles:
    - opnsense-ddclient
