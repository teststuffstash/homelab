# OPNsense ACME (Let's Encrypt) — TLS cert for opnsense.teststuff.net.
#
# Captures the os-acme-client config as code: the LE account, a DNS-01 validation
# via AWS Route 53, the certificate, and the post-renewal action (restart the web
# UI). The account private key is generated by acme.sh on registration, so it is
# NOT stored here. The only secret inputs are the Route 53 credentials, passed via
# env (same pattern as the API creds in opnsense-bgp.yml) so nothing sensitive lands
# in git — this repo is slated to go public.
#
# Managed as code via the oxlorg.opnsense collection (pinned to 25.7.8 to match
# os-frr/os-acme-client on OPNsense 26.1 — see ansible/collections/requirements.yml).
#
# Run:
#   ansible-galaxy collection install -r ansible/collections/requirements.yml
#   export OPN_API_KEY=...   OPN_API_SECRET=...      # OPNsense API creds
#   export ACME_AWS_KEY=...  ACME_AWS_SECRET=...     # AWS Route 53 (DNS-01) creds
#   PYENV=$(nix build --no-link --print-out-paths path:./ansible/controller-env)
#   ansible-playbook ansible/opnsense-acme.yml \
#     -e ansible_python_interpreter="$PYENV/bin/python3"
#
# Prereq: the os-acme-client plugin must be INSTALLED on OPNsense.
- name: OPNsense ACME / Let's Encrypt
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    cert_domain: opnsense.teststuff.net
    opnsense_conn: &conn
      firewall: "192.168.2.1"
      api_key: "{{ lookup('env', 'OPN_API_KEY') }}"
      api_secret: "{{ lookup('env', 'OPN_API_SECRET') }}"
      ssl_verify: false # default self-signed cert
  module_defaults:
    oxlorg.opnsense.acme_general: *conn
    oxlorg.opnsense.acme_account: *conn
    oxlorg.opnsense.acme_action: *conn
    oxlorg.opnsense.acme_validation: *conn
    oxlorg.opnsense.acme_certificate: *conn
    oxlorg.opnsense.raw: *conn
  tasks:
    - name: ACME general settings
      oxlorg.opnsense.acme_general:
        auto_renewal: true
        challenge_port: 43580
        tls_challenge_port: 43581
        restart_timeout: 600
        haproxy_integration: false

    - name: Let's Encrypt account
      oxlorg.opnsense.acme_account:
        name: "TestStuff OPNSense"
        email: "soot.rasmus@gmail.com"
        ca: letsencrypt
        register: true

    # Run after issue/renewal so the web UI picks up the new cert.
    - name: Restart-web-UI action
      oxlorg.opnsense.acme_action:
        name: "restart web gui"
        type: configd_restart_gui

    # DNS-01 via AWS Route 53. Creds from env (never committed).
    - name: AWS Route 53 DNS-01 validation
      oxlorg.opnsense.acme_validation:
        name: aws-acme
        method: dns01
        dns_service: dns_aws
        dns_aws_id: "{{ lookup('env', 'ACME_AWS_KEY') }}"
        dns_aws_secret: "{{ lookup('env', 'ACME_AWS_SECRET') }}"

    # Certificate: managed create-if-absent (keyed on name), NOT full reconcile.
    # Why: the acme_certificate module matches existing certs by `description`, but
    # os-acme-client 4.16 (OPNsense 26.1) does not persist that field on certs —
    # so the module can never match an existing cert and would append a duplicate
    # on every run (and a 2nd issuance). Guarding on the cert name makes this safe
    # on the live box (skips — the cert already exists) and correct on a fresh box
    # (creates it once). To change the cert definition later, edit it in the GUI or
    # delete + re-run.
    - name: List existing ACME certificates
      oxlorg.opnsense.raw:
        module: acmeclient
        controller: certificates
        command: search
      register: acme_certs

    - name: "Certificate {{ cert_domain }} (create if absent)"
      oxlorg.opnsense.acme_certificate:
        description: "{{ cert_domain }}"
        name: "{{ cert_domain }}"
        alt_names: ["{{ cert_domain }}"]
        account: "TestStuff OPNSense"
        validation: aws-acme
        restart_actions: ["restart web gui"]
        key_length: key_ec384
        auto_renewal: true
        renew_interval: 60
      when: cert_domain not in (acme_certs.response.rows | map(attribute='name') | list)
