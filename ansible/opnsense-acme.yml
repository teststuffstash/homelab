# OPNsense ACME (Let's Encrypt) — TLS cert for opnsense.teststuff.net.
#
# Captures the os-acme-client config as code: the LE account, a DNS-01 validation
# via Cloudflare, the certificate, and the post-renewal action (restart the web
# UI). The account private key is generated by acme.sh on registration, so it is
# NOT stored here. The only secret input is the Cloudflare DNS token, passed via
# env (same pattern as the API creds in opnsense-bgp.yml) so nothing sensitive lands
# in git — this repo is slated to go public.
#
# DNS-01 moved Route53 -> Cloudflare when teststuff.net's NS moved to Cloudflare
# (2026-06): LE queries the authoritative NS, so the challenge TXT must be written
# where DNS actually lives. Mint the scoped CF token with tofu/cloudflare-token/
# (output acme_dns_token) — Zone:Read + DNS:Edit on teststuff.net only.
#
# Managed as code via the oxlorg.opnsense collection (pinned to 25.7.8 to match
# os-frr/os-acme-client on OPNsense 26.1 — see ansible/collections/requirements.yml).
#
# Run:
#   ansible-galaxy collection install -r ansible/collections/requirements.yml
#   export OPN_API_KEY=...   OPN_API_SECRET=...      # OPNsense API creds
#   export ACME_CF_TOKEN=$(cat ~/.claude/cloudflare/acme-token)  # Cloudflare DNS-01 token
#   bash scripts/opnsense-playbook.sh ansible/opnsense-acme.yml
#
# (The wrapper handles the httpx interpreter + OPN creds. ACME_CF_TOKEN is only needed on the
#  swap run / when (re)setting the validation; later cert-adding runs can omit it.)
#
# Prereq: the os-acme-client plugin must be INSTALLED on OPNsense.
- name: OPNsense ACME / Let's Encrypt
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    # Cloudflare zone teststuff.net (non-secret IDs; the token is the secret, via env).
    acme_cf_account_id: "07b08646b26bb43cd3073826f43b73da"
    acme_cf_zone_id: "6b63f95592a9e036f8b8f6934511d321"
    # Each cert + the action os-acme-client runs after issue/renewal (so the right
    # service reloads to pick up the new cert).
    cert_specs:
      - { name: opnsense.teststuff.net, restart_action: "restart web gui" }       # OPNsense web UI
      - { name: homeassistant.teststuff.net, restart_action: "reload haproxy" }   # Home Assistant via HAProxy
      - { name: grafana.teststuff.net, restart_action: "reload haproxy" }         # Grafana via HAProxy
      - { name: prometheus.teststuff.net, restart_action: "reload haproxy" }      # Prometheus via HAProxy
      - { name: alertmanager.teststuff.net, restart_action: "reload haproxy" }    # Alertmanager via HAProxy
    opnsense_conn: &conn
      firewall: "192.168.2.1"
      api_key: "{{ lookup('env', 'OPN_API_KEY') }}"
      api_secret: "{{ lookup('env', 'OPN_API_SECRET') }}"
      ssl_verify: false # default self-signed cert
  module_defaults:
    oxlorg.opnsense.acme_general: *conn
    oxlorg.opnsense.acme_account: *conn
    oxlorg.opnsense.acme_action: *conn
    oxlorg.opnsense.acme_validation: *conn
    oxlorg.opnsense.acme_certificate: *conn
    oxlorg.opnsense.raw: *conn
  tasks:
    - name: ACME general settings
      oxlorg.opnsense.acme_general:
        auto_renewal: true
        challenge_port: 43580
        tls_challenge_port: 43581
        restart_timeout: 600
        haproxy_integration: false

    - name: Let's Encrypt account
      oxlorg.opnsense.acme_account:
        name: "TestStuff OPNSense"
        email: "soot.rasmus@gmail.com"
        ca: letsencrypt
        register: true

    # Post-issue/renewal actions: reload the service that serves each cert.
    - name: Restart-web-UI action (opnsense.teststuff.net)
      oxlorg.opnsense.acme_action:
        name: "restart web gui"
        type: configd_restart_gui

    - name: Reload-HAProxy action (homeassistant.teststuff.net)
      oxlorg.opnsense.acme_action:
        name: "reload haproxy"
        type: configd_restart_haproxy

    # DNS-01 via Cloudflare. We UPDATE the existing `aws-acme` validation in place, swapping
    # its backend dns_aws -> dns_cf, so the certs (which bind to the name `aws-acme`) need no
    # changes. The name is now just a retained identifier — its backend is Cloudflare. (The
    # acme_certificate module can't reliably repoint existing certs, hence repurposing the
    # validation rather than making a new one.)
    #
    # Guarded on the CF token being present: the swap run sets ACME_CF_TOKEN; later
    # cert-adding runs can omit it (OPNsense keeps the stored creds), like the old AWS pattern.
    - name: "Cloudflare DNS-01 validation (repoint aws-acme -> Cloudflare)"
      oxlorg.opnsense.acme_validation:
        name: aws-acme
        method: dns01
        dns_service: dns_cf
        dns_cf_token: "{{ lookup('env', 'ACME_CF_TOKEN') }}"
        dns_cf_account_id: "{{ acme_cf_account_id }}"
        dns_cf_zone_id: "{{ acme_cf_zone_id }}"
      when: lookup('env', 'ACME_CF_TOKEN') | length > 0

    # Certificate: managed create-if-absent (keyed on name), NOT full reconcile.
    # Why: the acme_certificate module matches existing certs by `description`, but
    # os-acme-client 4.16 (OPNsense 26.1) does not persist that field on certs —
    # so the module can never match an existing cert and would append a duplicate
    # on every run (and a 2nd issuance). Guarding on the cert name makes this safe
    # on the live box (skips — the cert already exists) and correct on a fresh box
    # (creates it once). To change the cert definition later, edit it in the GUI or
    # delete + re-run.
    - name: List existing ACME certificates
      oxlorg.opnsense.raw:
        module: acmeclient
        controller: certificates
        command: search
      register: acme_certs

    - name: "ACME certificate (create if absent)"
      oxlorg.opnsense.acme_certificate:
        description: "{{ item.name }}"
        name: "{{ item.name }}"
        alt_names: ["{{ item.name }}"]
        account: "TestStuff OPNSense"
        validation: aws-acme
        restart_actions: ["{{ item.restart_action }}"]
        key_length: key_ec384
        auto_renewal: true
        renew_interval: 60
      loop: "{{ cert_specs }}"
      loop_control: { label: "{{ item.name }}" }
      when: item.name not in (acme_certs.response.rows | map(attribute='name') | list)
