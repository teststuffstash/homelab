---
# OPNsense ACME / Let's Encrypt (DNS-01 via Cloudflare). Thin role-caller — logic in
# roles/opnsense-acme, config in group_vars/opnsense.yml.
# Run: export ACME_CF_TOKEN=$(cat ~/.claude/cloudflare/acme-token)  # only on a (re)set
#      bash scripts/opnsense-playbook.sh ansible/opnsense-acme.yml
- name: OPNsense ACME / Let's Encrypt
  hosts: opnsense
  gather_facts: false
  module_defaults:
    oxlorg.opnsense.acme_general: "{{ opnsense_conn }}"
    oxlorg.opnsense.acme_account: "{{ opnsense_conn }}"
    oxlorg.opnsense.acme_action: "{{ opnsense_conn }}"
    oxlorg.opnsense.acme_validation: "{{ opnsense_conn }}"
    oxlorg.opnsense.acme_certificate: "{{ opnsense_conn }}"
    oxlorg.opnsense.raw: "{{ opnsense_conn }}"
  roles:
    - opnsense-acme
