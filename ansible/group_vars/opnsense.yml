# Deployment config for the OPNsense router (group `opnsense`). The roles under
# roles/opnsense-* hold the *logic*; the *values* live here — so when a role is
# eventually extracted to its own git repo, only these values stay behind.
#
# Secrets are NOT here: the API key/secret and the ACME Cloudflare token come from
# the environment (set by scripts/opnsense-playbook.sh from ~/.claude/...).

# --- API connection (shared by all oxlorg.opnsense modules via module_defaults) ---
opnsense_conn:
  firewall: "{{ ansible_host }}"            # 192.168.2.1 (from the inventory)
  api_key: "{{ lookup('env', 'OPN_API_KEY') }}"
  api_secret: "{{ lookup('env', 'OPN_API_SECRET') }}"
  ssl_verify: false                          # default self-signed cert

# --- opnsense-bgp : FRR/BGP peering with Cilium ---
opnsense_asn: 64512
cluster_asn: 64513
bgp_router_id: "192.168.2.1"
bgp_node_ips:                                # Talos nodes that peer (BGP neighbors)
  - 192.168.2.51   # cp-01
  - 192.168.2.61   # wk-01
  - 192.168.2.62   # wk-02
  # Bare-metal nodes — were never added when onboarded, so they sat BGP `idle` (never peered,
  # never advertised VIPs); the Cilium BGP metrics caught it (2026-06-11). Cilium's nodeSelector
  # is all-nodes, so OPNsense must list every node here (explicit neighbors, not a listen-range).
  - 192.168.2.54   # hp-01
  - 192.168.2.53   # thinkcentre
  - 192.168.2.182  # wk-metal-01
  - 192.168.2.183  # wk-metal-02
  - 192.168.2.184  # wk-metal-03 (kata node, onboarded 2026-07-13)

# --- opnsense-acme : Let's Encrypt certs (DNS-01 via Cloudflare) ---
acme_account_name: "TestStuff OPNSense"
acme_account_email: "teststuffou@protonmail.com"
acme_cf_account_id: "07b08646b26bb43cd3073826f43b73da"   # non-secret zone/account IDs
acme_cf_zone_id: "6b63f95592a9e036f8b8f6934511d321"      # teststuff.net
# ACME_CF_TOKEN comes from the env (only needed when (re)setting the validation).
acme_cert_specs:                             # name + the service to reload post-issue
  - { name: opnsense.teststuff.net, restart_action: "restart web gui" }
  - { name: homeassistant.teststuff.net, restart_action: "reload haproxy" }
  - { name: grafana.teststuff.net, restart_action: "reload haproxy" }
  - { name: prometheus.teststuff.net, restart_action: "reload haproxy" }
  - { name: alertmanager.teststuff.net, restart_action: "reload haproxy" }
  - { name: forgejo.teststuff.net, restart_action: "reload haproxy" }
  - { name: argo.teststuff.net, restart_action: "reload haproxy" }
  - { name: s3.teststuff.net, restart_action: "reload haproxy" }
  - { name: oracle-specs.teststuff.net, restart_action: "reload haproxy" }
  - { name: argocd.teststuff.net, restart_action: "reload haproxy" }
  - { name: infisical.teststuff.net, restart_action: "reload haproxy" }
  - { name: transcripts.local.teststuff.net, restart_action: "reload haproxy" }
  # Per-stack WILDCARD certs (ADR-092): one cert covers every name a stack exposes under its
  # subdomain, so the stack adds hostnames in its own -iac repo (HTTPRoutes) with NO homelab
  # change. `name` MUST be a real domain — OPNsense passes it as acme.sh's FIRST `--domain`
  # (the CN), so it's the apex `oracle.teststuff.net`; the wildcard rides `alt_names`. The cert
  # covers apex + `*.oracle`. DNS-01 issues wildcards fine (both authz challenge at
  # `_acme-challenge.oracle`) — the homelab-acme-dns CF token has zone-wide DNS-write. NOTE:
  # oracle-specs.teststuff.net (above) STAYS live on its own 3.20 path — the stack migrates the
  # spec site to specs.oracle.teststuff.net in oracle-iac when ready; only then retire the
  # oracle-specs entries (runbook "retire a per-name HTTPS entry").
  - { name: oracle.teststuff.net, alt_names: ["*.oracle.teststuff.net"], restart_action: "reload haproxy" }

# --- opnsense-haproxy : HTTPS reverse proxy for LAN-exposed cluster services ---
# name -> object prefix + Unbound/cert hostname. Keep `ha` first/unchanged so the
# existing objects match. One dedicated IP-alias VIP each, **always from 192.168.3.0/24**
# (docs/ip-plan.md, ADR-088): a VIP inside the 2.0/24 host range makes OPNsense ARP-shadow the
# real owner (bit three times: transcripts on .11 = USW switch, then .30 = Matchbox LXC;
# infisical on .10 = pop-os — all migrated to 3.0/24 2026-07-13, FU-071). No real host is
# allowed in 3.0/24, so collision is impossible. Convention: last octet mirrors the backend's
# cluster VIP (3.19 ↔ 40.19). A vip change here rebinds the frontend (role rebind-on-drift
# task), but the OLD IP-alias + Unbound override must be API-deleted (unbound match_fields
# includes value, so the play appends rather than updates). Every frontend binds :443;
# OPNsense's own web UI owns 2.1:443.
# ⚠⚠ AFTER any `interfaces/vip_settings/reconfigure` (alias add/delete): it FLUSHES the FRR/BGP
# routes from the KERNEL while bgpd still shows Established + zebra thinks they're installed —
# ALL 192.168.40.x cluster VIPs black-hole (25-min LAN outage, 2026-07-13). Recovery is a REAL
# FRR cycle: `/api/quagga/service/stop` then `start` — the `restart` endpoint is a NO-OP (returns
# OK, restarts nothing; verify via `cilium bgp peers` uptime). Check afterwards that
# `/api/diagnostics/interface/get_routes` lists 192.168.40.x again.
haproxy_proxied_services:
  - { name: ha, cert_domain: homeassistant.teststuff.net, vip: 192.168.3.10, backend_ip: 192.168.40.10, backend_port: 8123 }
  - { name: grafana, cert_domain: grafana.teststuff.net, vip: 192.168.3.11, backend_ip: 192.168.40.11, backend_port: 80 }
  - { name: prometheus, cert_domain: prometheus.teststuff.net, vip: 192.168.3.13, backend_ip: 192.168.40.13, backend_port: 9090 }
  - { name: alertmanager, cert_domain: alertmanager.teststuff.net, vip: 192.168.3.14, backend_ip: 192.168.40.14, backend_port: 9093 }
  - { name: forgejo, cert_domain: forgejo.teststuff.net, vip: 192.168.3.15, backend_ip: 192.168.40.15, backend_port: 3000 }
  - { name: garage-s3, cert_domain: s3.teststuff.net, vip: 192.168.3.16, backend_ip: 192.168.40.16, backend_port: 3900 }  # Garage S3 (path-style)
  - { name: argo, cert_domain: argo.teststuff.net, vip: 192.168.3.24, backend_ip: 192.168.40.24, backend_port: 2746 }  # Argo Workflows UI (agent-loop DAG drill-down; server-auth, LAN-trust)
  # Garage static-website endpoint (3902) — browser-served buckets (oracle-fleet#16 spec site).
  # KEPT LIVE (ADR-092): the spec site stays on this direct 3.20 path as oracle-specs.teststuff.net
  # until the oracle stack migrates it to specs.oracle.teststuff.net via its gateway (oracle-iac,
  # when ready). Mirror-convention exception: shares s3's 40.16 (same Garage VIP, port 3902) so it
  # takes the next free VIP 3.20 rather than double-binding :443 on 3.16.
  - { name: garage-oracle-specs-web, cert_domain: oracle-specs.teststuff.net, vip: 192.168.3.20, backend_ip: 192.168.40.16, backend_port: 3902 }
  # GitOps + secrets UIs — TLS terminated here; backends serve plain HTTP (argocd-server
  # --insecure, infisical). VIPs from the expanded static range (pool now starts .100).
  - { name: argocd, cert_domain: argocd.teststuff.net, vip: 192.168.3.17, backend_ip: 192.168.40.17, backend_port: 80 }
  - { name: infisical, cert_domain: infisical.teststuff.net, vip: 192.168.3.18, backend_ip: 192.168.40.18, backend_port: 80 }
  # Agent transcripts viewer — INTERNAL ONLY (transcripts carry repo content; never tunneled).
  - { name: transcripts, cert_domain: transcripts.local.teststuff.net, vip: 192.168.3.19, backend_ip: 192.168.40.19, backend_port: 3727 }

# TCP passthrough (no TLS) — Forgejo SSH clone on forgejo.teststuff.net:22 -> cluster VIP.
# Reuses the forgejo HTTPS VIP (3.15, created above), so one hostname serves HTTPS:443 + SSH:22.
haproxy_tcp_services:
  - { name: forgejo-ssh, vip: 192.168.3.15, port: 22, backend_ip: 192.168.40.15, backend_port: 22 }

# --- opnsense-haproxy : per-stack subdomain delegation (ADR-092) ---------------
# OPT-IN: a stack that exposes NO LAN service wires nothing (leave this empty). Each entry
# wires a stack's `*.<stack>.teststuff.net` ONCE at the platform: a wildcard-cert HAProxy
# frontend on a dedicated 3.0/24 VIP whose default backend is the stack's in-cluster Cilium
# Gateway API gateway (plain HTTP :80 on its 40.x LB VIP), plus a WILDCARD Unbound override
# (`*.<stack>` -> the VIP; hostname `*` verified API-accepted 2026-07-15). The stack then owns
# every hostname under its subdomain via HTTPRoutes in its own -iac repo — adding a name is a
# PR there, ZERO homelab change. HAProxy is a dumb wildcard TLS terminator (no host ACLs); the
# gateway does host routing. These entries reuse the HTTP frontend machinery above (merged into
# haproxy_all_services by the role) — so `cert_domain` here is the wildcard cert's OBJECT NAME
# (the acme `name` == its CN/apex domain, e.g. oracle.teststuff.net — the cert also covers
# `*.oracle`), NOT a per-host name; `wildcard_domain` drives the wildcard DNS override.
# Same 3.0/24 rules + VIP-flush caveat as haproxy_proxied_services apply.
stack_gateways:
  # 3.22 ↔ 40.22 (mirror convention): 40.10-40.21 are taken (40.20/.21 = registry-cache
  # mirrors, ADR-091), so the oracle gateway's cluster VIP is the next free 40.22.
  - { name: oracle-gw, cert_domain: oracle.teststuff.net, wildcard_domain: oracle.teststuff.net,
      vip: 192.168.3.22, backend_ip: 192.168.40.22, backend_port: 80 }

# --- opnsense-wireguard : road-warrior VPN (full-LAN remote access, ADR-090) ---
# The server keypair is generated ON the router at first run (privkey never leaves it).
# Peer PRIVATE keys live on the devices + the KeePass wallet (wireguard-<name>-privkey);
# only pubkeys here. Render device configs with scripts/wireguard-client.sh <name> [--qr].
# Tunnel subnet is carved from the routed-virtual overflow block (docs/ip-plan.md).
wireguard_instance_name: roadwarrior
wireguard_port: 51820                       # UDP; WAN-inbound rule is part of the role
wireguard_tunnel_address: 192.168.64.1/24   # router's tunnel IP
wireguard_tunnel_network: 192.168.64.0/24   # peer pool (keep in sync with the above)
wireguard_endpoint_host: wg.teststuff.net   # name clients dial — kept on the dynamic WAN IP by opnsense-ddclient
wireguard_client_dns: 192.168.2.1           # Unbound → *.teststuff.net resolves like on the LAN
wireguard_client_networks: 192.168.0.0/16   # split tunnel: home ranges only (LAN + 3.0/24 HAProxy VIPs + 32.0/19 BGP VIPs)
wireguard_peers:
  - { name: laptop, tunnel_ip: 192.168.64.10, pubkey: "anIW3Zjh3JIsA50XB2Ng11nDUuz7jWrGUhvATZ1LByw=" }
  - { name: phone,  tunnel_ip: 192.168.64.11, pubkey: "KHOs7oMM/Mf+d7fVLVBBcLmdM4mvzXAOlQDo/dOPaRg=" }

# --- opnsense-ddclient : dynamic DNS for the WireGuard endpoint (ADR-090) ---
# Native backend, Cloudflare service; credential = the ACME DNS token (env ACME_CF_TOKEN,
# needed on first run only). checkip reads the WAN interface directly (public IP, no CGNAT).
ddclient_zone: teststuff.net
ddclient_hostname: wg.teststuff.net
ddclient_account_description: "wg endpoint (ansible)"

# --- opnsense-unbound : static LAN host overrides not created by another role ---
unbound_hosts:
  - { hostname: ubiquiti, domain: teststuff.net, value: 192.168.40.12, description: "UniFi Network Application (controller VIP)" }
  - { hostname: argo, domain: teststuff.net, value: 192.168.3.24, description: "Argo Workflows UI (HAProxy VIP; backend LB 40.24)" }
