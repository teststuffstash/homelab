# prometheus-pushgateway — worker run-metric sink (FU-057). Plain k8s resources, ArgoCD-owned
# (minimize-tofu direction, like github-exporter/otel-collector). The monitoring namespace + the
# ServiceMonitor CRD come from tofu's kube-prometheus-stack, outside ArgoCD.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources:
  - deployment.yaml
  - service.yaml
  - servicemonitor.yaml
  - prometheusrule.yaml

# Per-issue drill-down over the agent_run_* labels this pushgateway carries (project/issue/round/
# role) + the OTLP claude_code_* metrics + Loki worker logs. Same sidecar-discovery pattern as
# github-exporter's dashboard; the three aggregate agent dashboards live in tofu/dashboards/.
configMapGenerator:
  - name: grafana-dashboard-agent-issue
    files:
      - agent-issue.json=dashboard-agent-issue.json
    options:
      labels:
        grafana_dashboard: "1" # the Grafana sidecar discovers this label across ALL namespaces
