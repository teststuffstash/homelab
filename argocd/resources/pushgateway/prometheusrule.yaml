# Agent-run data-quality + stall alerts (FU-057 polish, 2026-07-10). Prometheus picks up
# PrometheusRules cluster-wide; Alertmanager routes to the HA webhook (tofu/monitoring.tf).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: agent-runs
  labels:
    app: pushgateway
spec:
  groups:
    - name: agent-runs
      rules:
        # A negative cost is a DATA-QUALITY bug, never a discount — the probe-fails-into-a-value
        # class (agent-runtime#12 fixed the known instance; this alert catches regressions and any
        # new path that subtracts against a failed read).
        - alert: AgentRunNegativeCost
          expr: agent_run_cost_usd < 0
          labels:
            severity: warning
          annotations:
            summary: "Agent run reported NEGATIVE cost ({{ $labels.project }} issue {{ $labels.issue }})"
            description: "agent_run_cost_usd={{ $value }} for pod-pushed run (model {{ $labels.model }}, round {{ $labels.round }}) — a probe failed into a value somewhere in the cost pipeline. See agent-runtime#12 for the class."
        # An infra-death burst: ≥3 non-clean terminal runs in an hour on one project means a wall,
        # not bad luck — the meta-2 pattern (three attempts, three walls) as an alert.
        - alert: AgentRunInfraDeathBurst
          expr: sum by (project) (count_over_time(agent_run_total{exit_status!~"clean|ci-failed"}[1h])) >= 3
          labels:
            severity: warning
          annotations:
            summary: "3+ non-clean agent runs in 1h on {{ $labels.project }}"
            description: "Repeated infra-class terminals (auth-storm/no-artifact/harness-death/…) — check the strike comments on the active issue before more budget burns."
        # FU-020 enforcement made loud: a worker egress miss under deny-all manifests as a HANG
        # (devbox install against a blocked FQDN — the nix-cache finding), which the run classifier
        # only names `timeout` much later. This alert names the CAUSE within minutes. `source` is
        # the namespace (hubble drop metric runs sourceContext=namespace, tofu/cilium.tf); scoped to
        # worker namespaces via the AgentStack-claim convention ns==repo — extend the regex when a
        # new stack's fixer repo onboards (or it enforces before its alert exists).
        - alert: AgentWorkerEgressDropped
          expr: sum by (source) (rate(hubble_drop_total{reason="POLICY_DENIED", source=~"oracle-fleet|sleep-tracking|openrouter-operator"}[5m])) > 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Worker egress DROPPED by netpol in {{ $labels.source }}"
            description: "Sustained POLICY_DENIED drops from namespace {{ $labels.source }} — an agent-worker-egress allowlist miss (or an attempted forbidden exit). If a ride is in flight it is probably HUNG on this. Diff the flows: hubble observe -n {{ $labels.source }} --verdict DROPPED (relay). Legit destination → add to the claim's egress.extraFQDNs."
