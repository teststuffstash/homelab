# Collector pipeline (the A0 "standard rail", docs/agents/observability-and-retro.md): OTLP in →
# logs to Loki (native /otlp ingest, schema v13), metrics exposed for Prometheus to scrape via the
# ServiceMonitor next to this file. No traces pipeline yet — Claude Code traces are still beta and
# there's no Tempo; add it when traces GA.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  otlphttp/loki:
    endpoint: http://loki.loki.svc.cluster.local:3100/otlp
  prometheus:
    endpoint: 0.0.0.0:8889

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
