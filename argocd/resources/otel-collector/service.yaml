# In-cluster OTLP sink — agent pods (any namespace) export to
# http://otel-collector.monitoring.svc:4318 (http/protobuf). The prom port is scraped via the
# ServiceMonitor (job label = "otel-collector").
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  labels:
    app: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
    - { name: otlp-http, port: 4318, targetPort: 4318 }
    - { name: http-metrics, port: 8889, targetPort: 8889 }
