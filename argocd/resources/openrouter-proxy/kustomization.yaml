# openrouter-proxy — the ADR-081 egress proxy, v1 = provider-pin injection for goose
# (homelab FU-018/FU-062 §M4; the header of openrouter-proxy.py is the full story).
# configMapGenerator hash-names roll the pod on script edits, like github-exporter.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: agent-egress

resources:
  - namespace.yaml
  - rbac.yaml
  - deployment.yaml
  - service.yaml
  - servicemonitor.yaml
  - prometheusrule.yaml

configMapGenerator:
  - name: openrouter-proxy-script
    files:
      - openrouter-proxy.py
  - name: grafana-dashboard-subscription
    files:
      - subscription.json=dashboard-subscription.json
    options:
      labels:
        grafana_dashboard: "1" # the Grafana sidecar discovers this label across ALL namespaces
