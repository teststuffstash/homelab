# openrouter-proxy — the ADR-081 egress proxy, v1 = provider-pin injection for goose
# (homelab FU-018/FU-062 §M4; the header of openrouter-proxy.py is the full story).
# configMapGenerator hash-names roll the pod on script edits, like github-exporter.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: agent-egress

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml

configMapGenerator:
  - name: openrouter-proxy-script
    files:
      - openrouter-proxy.py
