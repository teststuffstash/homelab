# ADR-087 / FU-018 leg A: the proxy resolves `ref:<ns>/<secret>` session-key references via the
# K8s API. RBAC is deliberately NARROW: a get-secrets Role bound in EACH worker project namespace
# (never cluster-wide), and the proxy code additionally honors only Secrets labeled
# `openrouter.teststuff.net/session-key` — RBAC bounds the blast radius, the label check stops the
# proxy being a generic secret oracle even within it.
#
# The per-project Roles/RoleBindings (`agentstack-proxy-session-keys`) are COMPOSED by each
# stack's AgentStack claim (FU-048, argocd/resources/agentstack/composition.yaml) — the hand-list
# that used to live in agents/coordinator/openrouter-proxy-rbac.yaml is gone (all stacks on
# claims 2026-07-12). Only the SA lives here (this kustomization's namespace transformer would
# squash cross-namespace RBAC anyway).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openrouter-proxy
  namespace: agent-egress
---
# FU-080: the loop-token leg authenticates callers via TokenReview — a cluster-scoped create.
# This is the ONLY cluster-scoped grant the proxy holds; TokenReview validates tokens, it cannot
# read or mint anything.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openrouter-proxy-tokenreview
rules:
  - apiGroups: [authentication.k8s.io]
    resources: [tokenreviews]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openrouter-proxy-tokenreview
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: openrouter-proxy-tokenreview }
subjects:
  - { kind: ServiceAccount, name: openrouter-proxy, namespace: agent-egress }
