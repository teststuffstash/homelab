# CNPG Postgres for Infisical. HA pair on Longhorn. The app role's password is supplied
# (not generated) via the tofu-seeded basic-auth secret `infisical-pg-app`, so tofu's
# connection string (infisical-db) always matches. CNPG creates the `infisical-pg-rw`
# service the connection string targets.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: infisical-pg
  namespace: infisical
spec:
  instances: 2
  # FU-082: a BestEffort database is first in the OOM-kill order under node memory pressure —
  # unacceptable for a DB. Requests lift it to Burstable + honest scheduling (~100Mi steady);
  # the memory limit is generous headroom (shared_buffers/work_mem/connections), not a tight cap.
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { memory: "768Mi" }
  # Expose CNPG metrics — the operator creates a PodMonitor that kube-prometheus-stack
  # auto-discovers (open selectors). Feeds the cnpg alerts + dashboard (tofu/monitoring.tf).
  monitoring:
    enablePodMonitor: true
  storage:
    size: 5Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: infisical
      owner: infisical
      secret:
        name: infisical-pg-app # tofu-seeded basic-auth (username: infisical)
