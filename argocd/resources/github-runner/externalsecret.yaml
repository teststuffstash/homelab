# GitHub App credential for ARC → delivered by ESO from Infisical (homelab/prod). The
# gha-runner-scale-set chart reads this Secret (githubConfigSecret: arc-github-app) to register
# the `homelab-ephemeral` runner scale set against the teststuffstash org. The rendered keys
# (github_app_id / github_app_installation_id / github_app_private_key) are what ARC expects.
#
# ⚠ The private key is stored **base64-encoded** in Infisical (GHARC_PRIVATE_KEY_B64) and decoded
# here with b64dec. A raw multiline PEM does NOT survive the secrets store intact — the newlines get
# stripped, yielding a single-line blob that ARC's Go PEM parser rejects ("Key must be a PEM encoded
# PKCS1 or PKCS8 key"). base64 is newline-safe and byte-exact.
#
# Prereq: GHARC_APP_ID, GHARC_INSTALL_ID, GHARC_PRIVATE_KEY_B64 in Infisical (the bootstrap script
# pushes them; see argocd/platform/github-runner-secrets.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: arc-github-app
  namespace: arc-runners
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: arc-github-app
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        github_app_id: "{{ .app_id }}"
        github_app_installation_id: "{{ .install_id }}"
        github_app_private_key: "{{ .private_key_b64 | b64dec }}"
  data:
    - secretKey: app_id
      remoteRef: { key: GHARC_APP_ID }
    - secretKey: install_id
      remoteRef: { key: GHARC_INSTALL_ID }
    - secretKey: private_key_b64
      remoteRef: { key: GHARC_PRIVATE_KEY_B64 }
