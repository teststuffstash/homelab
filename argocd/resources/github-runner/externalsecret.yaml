# GitHub App credential for ARC → delivered by ESO from Infisical (homelab/prod). The
# gha-runner-scale-set chart reads this Secret (githubConfigSecret: arc-github-app) to register
# the `homelab-ephemeral` runner scale set against the teststuffstash org. The key names below
# (github_app_id / github_app_installation_id / github_app_private_key) are what ARC expects.
#
# ⚠ The private key is a multiline PEM. Store it in Infisical with the CLI's file-load syntax so the
# newlines survive byte-exact:  `infisical secrets set GHARC_PRIVATE_KEY=@/path/to/app.pem`
# (the bootstrap script does this). Do NOT paste it as a plain inline value — that escapes the
# newlines to literal `\n`, and ARC's Go PEM parser then rejects it ("Key must be a PEM encoded
# PKCS1 or PKCS8 key"). ESO writes the value through verbatim (plain data mapping, no template).
#
# Prereq: GHARC_APP_ID, GHARC_INSTALL_ID, GHARC_PRIVATE_KEY in Infisical (see the bootstrap note in
# argocd/platform/github-runner-secrets.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: arc-github-app
  namespace: arc-runners
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: arc-github-app
    creationPolicy: Owner
  data:
    - secretKey: github_app_id
      remoteRef: { key: GHARC_APP_ID }
    - secretKey: github_app_installation_id
      remoteRef: { key: GHARC_INSTALL_ID }
    - secretKey: github_app_private_key
      remoteRef: { key: GHARC_PRIVATE_KEY }
