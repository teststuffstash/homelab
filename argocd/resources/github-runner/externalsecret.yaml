# GitHub App credential for ARC → delivered by ESO from Infisical (homelab/prod). The
# gha-runner-scale-set chart reads this Secret (githubConfigSecret: arc-github-app) to register
# the `homelab-ephemeral` runner scale set against the teststuffstash org. The rendered keys
# (github_app_id / github_app_installation_id / github_app_private_key) are what ARC expects.
#
# ⚠ The Infisical CLI (v0.41.90) escapes a multiline PEM's newlines to literal `\n` on storage
# (and the `KEY=@file` load syntax is NOT honored — it stores the path string). So the template
# below un-escapes `\n` → real newlines, yielding a byte-exact PEM that ARC's Go parser accepts.
# This is robust either way: if a future CLI stores real newlines, there's no `\n` to replace and
# the value passes through unchanged. Store the key with:
#   devbox run infisical-secret GHARC_PRIVATE_KEY="$(cat /path/to/app.pem)"
#
# Prereq: GHARC_APP_ID, GHARC_INSTALL_ID, GHARC_PRIVATE_KEY in Infisical (the bootstrap script
# pushes them; see argocd/platform/github-runner-secrets.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: arc-github-app
  namespace: arc-runners
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: arc-github-app
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        github_app_id: "{{ .app_id }}"
        github_app_installation_id: "{{ .install_id }}"
        # un-escape literal \n that the Infisical CLI introduced (no-op if already real newlines)
        github_app_private_key: '{{ .pem | replace "\\n" "\n" }}'
  data:
    - secretKey: app_id
      remoteRef: { key: GHARC_APP_ID }
    - secretKey: install_id
      remoteRef: { key: GHARC_INSTALL_ID }
    - secretKey: pem
      remoteRef: { key: GHARC_PRIVATE_KEY }
