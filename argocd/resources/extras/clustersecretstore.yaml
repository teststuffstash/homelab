# ESO → Infisical. This is the steady-state seam: every downstream app secret becomes an
# ExternalSecret that reads from here, so values live in Infisical, never in git.
#
# ⚠️ Day-1.5 dependency: this needs a Universal-Auth *machine identity* that only exists
# AFTER Infisical is first running. Until you create it and seed the credential secret,
# this ClusterSecretStore stays NotReady (harmless — nothing reads it yet). Steps:
#   1. Log in to https://infisical.teststuff.net (admin signup is open on first boot —
#      create the admin, then disable signups).
#   2. Create org/project slug `homelab`, env `prod`; add a Machine Identity (Universal
#      Auth) with read access to that project.
#   3. Seed its credential (the one remaining KeePass→cluster hop):
#        kubectl -n external-secrets create secret generic infisical-machine-identity \
#          --from-literal=clientId=<id> --from-literal=clientSecret=<secret>
#      (store both in the KeePass wallet too). Then this reconciles to Ready.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical
spec:
  provider:
    infisical:
      # base API URL — mirrors the provider default shape (…/api). VERIFY on first
      # reconcile; some ESO versions append /api themselves (drop the suffix if so).
      hostAPI: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080/api
      auth:
        universalAuthCredentials:
          clientId:
            name: infisical-machine-identity
            namespace: external-secrets
            key: clientId
          clientSecret:
            name: infisical-machine-identity
            namespace: external-secrets
            key: clientSecret
      secretsScope:
        projectSlug: homelab
        environmentSlug: prod
        secretsPath: /
        recursive: true
