# ESO → Infisical. This is the steady-state seam: every downstream app secret becomes an
# ExternalSecret that reads from here, so values live in Infisical, never in git.
#
# The `infisical-machine-identity` credential this references (a Universal-Auth identity
# scoped read-only to homelab/prod) + the `homelab` project are created declaratively by
# `tofu/infisical/` (run `bash tofu/infisical/apply.sh apply`). No manual steps.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical
spec:
  provider:
    infisical:
      # base API URL — mirrors the provider default shape (…/api). VERIFY on first
      # reconcile; some ESO versions append /api themselves (drop the suffix if so).
      hostAPI: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080/api
      auth:
        universalAuthCredentials:
          clientId:
            name: infisical-machine-identity
            namespace: external-secrets
            key: clientId
          clientSecret:
            name: infisical-machine-identity
            namespace: external-secrets
            key: clientSecret
      secretsScope:
        projectSlug: homelab
        environmentSlug: prod
        secretsPath: /
        recursive: true
