# Canary proving the Infisical -> ESO -> k8s Secret chain end to end. The remote value
# (homelab/prod /DEMO_PING) is created by tofu/infisical. If demo-ping in ns secrets-demo
# holds "pong-from-infisical", the whole secrets loop is healthy. Copy this shape for real
# app secrets (use your own namespace + remoteRef keys).
apiVersion: v1
kind: Namespace
metadata:
  name: secrets-demo
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: demo-ping
  namespace: secrets-demo
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: demo-ping
  data:
    - secretKey: DEMO_PING
      remoteRef:
        key: DEMO_PING
