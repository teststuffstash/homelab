# Loki single-binary config. Chunks + index live in Garage S3 (bucket `loki`); only working dirs +
# caches are on the local PVC. Retention = 168h (7 days) enforced by the compactor. Creds come from
# the Crossplane-written loki-garage-s3 secret via env + `-config.expand-env=true`.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: loki
data:
  config.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9095
      log_level: info

    common:
      path_prefix: /loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: aws
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      aws:
        endpoint: garage.garage.svc.cluster.local:3900
        bucketnames: loki
        access_key_id: ${LOKI_S3_ACCESS_KEY_ID}
        secret_access_key: ${LOKI_S3_SECRET_ACCESS_KEY}
        s3forcepathstyle: true
        insecure: true
        region: garage
      tsdb_shipper:
        active_index_directory: /loki/tsdb-index
        cache_location: /loki/tsdb-cache

    compactor:
      working_directory: /loki/compactor
      retention_enabled: true
      delete_request_store: aws
      compaction_interval: 10m

    limits_config:
      retention_period: 168h          # 7 days — keep it small (revisit after watching usage)
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      ingestion_rate_mb: 8
      ingestion_burst_size_mb: 16
      volume_enabled: true
      max_query_lookback: 168h

    ruler:
      storage:
        type: local
        local:
          directory: /loki/rules

    analytics:
      reporting_enabled: false
