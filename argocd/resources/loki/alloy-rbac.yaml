# Alloy reads pod logs via the Kubernetes API (loki.source.kubernetes) — no hostPath, so it needs
# get/list/watch on pods + pods/log (and namespaces/nodes for discovery metadata).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: loki
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy-logs-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "namespaces", "nodes", "nodes/proxy"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy-logs-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy-logs-reader
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: loki
