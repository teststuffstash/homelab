# The poller pod. Stock python image + the script from the generated ConfigMap — no custom
# image pipeline. Parks in CreateContainerConfigError until ESO materialises the token Secret.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-exporter
  labels:
    app: github-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-exporter
  template:
    metadata:
      labels:
        app: github-exporter
    spec:
      containers:
        - name: exporter
          image: python:3.13-slim
          command: ["python3", "/app/github-exporter.py"]
          env:
            - name: GITHUB_ORG
              value: teststuffstash
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-exporter-token
                  key: token
          ports:
            - name: http-metrics
              containerPort: 9504
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9504
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: script
              mountPath: /app
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: github-exporter-script # kustomize rewrites to the hashed name
