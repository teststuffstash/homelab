# The GitHub fine-grained PAT (org Administration:read + repo Actions:read, all repos) from
# Infisical — minted click-only + pushed by scripts/github-exporter-pat-bootstrap.sh.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-exporter-token
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: github-exporter-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: GITHUB_EXPORTER_TOKEN
