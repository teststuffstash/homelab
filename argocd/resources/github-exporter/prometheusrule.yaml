# GitHub CI + billing alerts — replaces GitHub's failed-workflow emails (Alertmanager routes
# everything to the Home Assistant webhook, tofu/monitoring.tf). Prometheus picks up
# PrometheusRules cluster-wide (ruleSelectorNilUsesHelmValues=false).
#
# Only master/main run failures alert: PR-branch CI red is the agent breaker/fixer loop's
# domain (docs/agents/), and armed PRs can't merge red anyway (require_passed_checks).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: github-exporter
  labels:
    app: github-exporter
spec:
  groups:
    - name: github
      rules:
        - alert: GithubWorkflowRunFailed
          expr: (time() - github_workflow_run_updated_timestamp{conclusion=~"failure|startup_failure|timed_out", branch=~"master|main"}) < 3600
          labels:
            severity: warning
          annotations:
            summary: "GitHub workflow {{ $labels.repo }}/{{ $labels.workflow }} failed"
            description: "Run #{{ $labels.number }} ({{ $labels.event }} on {{ $labels.branch }}) concluded {{ $labels.conclusion }}: https://github.com/{{ $labels.owner }}/{{ $labels.repo }}/actions/runs/{{ $labels.id }} — auto-resolves 1h after the run."

        # METERED usage only — the Team-plan seat license ($4/mo) is a subscription and never
        # shows in the usage API. Metered spend should stay $0 inside included usage (hosted
        # minutes discounted to $0, self-hosted runners and public ghcr free; the org's 2026-07
        # statement: gross $0.54 / billed $0). Net >$1 month-to-date = a surprise (runaway
        # private-repo cron, storage overage) — catch it pre-invoice.
        - alert: GithubPaidUsage
          expr: sum(github_billing_net_amount) > 1
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "GitHub is billing real money this month"
            description: 'Month-to-date net spend is ${{ $value | printf "%.2f" }} (expected $0 — everything inside included usage). Break it down by SKU: sum by (product, sku, repo) (github_billing_net_amount).'

        # Included-quota burn — the Team plan includes 3000 hosted min/month (UI 2026-07:
        # "179 min used / 3,000 min included"); alert at 80%. unit=Min.* matches the API's
        # "Minutes" and excludes the GigabyteHours storage SKUs under the same product.
        - alert: GithubActionsMinutesHigh
          expr: sum(github_billing_usage{product=~"(?i)actions", unit=~"(?i)min.*", visibility="private"}) > 2400
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "GitHub Actions hosted minutes at 80% of included quota"
            description: '{{ $value | printf "%.0f" }} hosted-runner minutes this month (3000 included, resets monthly). Per repo: sum by (repo, sku) (github_billing_usage{product=~"(?i)actions", unit=~"(?i)min.*"}).'

        # Held Actions/Packages storage, derived: GB-hr is cumulative month-to-date, so its
        # 24h increase ÷ 24 = average GB currently held. Quota is 2 GB (the UI's "used" is the
        # month AVERAGE, so a spike shows there far too late — 2026-07-07 case: 6.2 GB of dead
        # image artifacts read as "1.2 GB used" while tripling the quota pace). Alert at 1.6 GB.
        - alert: GithubStorageHeldHigh
          expr: sum(increase(github_billing_usage{unit=~"(?i)gigabytehour.*"}[24h])) / 24 > 1.6
          for: 6h
          labels:
            severity: warning
          annotations:
            summary: "GitHub Actions/Packages storage at 80% of quota pace"
            description: '~{{ $value | printf "%.1f" }} GB held over the last day (2 GB included as a monthly average). Find it: per-repo github_billing_usage{unit=~"(?i)gigabytehour.*"}, then the repo''s /actions/artifacts — usually forgotten upload-artifact output (set retention-days, or push images to ghcr instead).'

        # Agent-loop guards (docs/agents/merge-path.md §Runaway dispatch). The detection layer
        # INDEPENDENT of the review-reflex's in-band circuit breaker: the 2026-07-12 oracle-fleet#13
        # loop posted 12 duplicate approvals over 90 min and NOTHING alerted — the operator noticed a
        # failed pod by hand. Trailing-1h per-author count (the PAT can't see commit objects, so
        # since-head isn't computable): a healthy worker↔reviewer iteration tops ~3 verdicts/h
        # (CI ~5min + reflex tick 5min + review ~6min per cycle); the incident ran ~8/h. >3 splits
        # the two with margin, and the series vanishing when the PR goes quiet self-resolves it.
        - alert: AgentReviewLoop
          expr: github_pull_request_reviews_recent > 3
          labels:
            severity: warning
          annotations:
            summary: "Review loop on {{ $labels.repo }}#{{ $labels.number }}"
            description: "{{ $labels.author }} has posted {{ $value }} verdict reviews in the last hour on https://github.com/{{ $labels.owner }}/{{ $labels.repo }}/pull/{{ $labels.number }} — that cadence is a dispatch loop, not iteration. Halt it: add the agent/error label (all agent automation skips it), then check the review-reflex breaker (agents/review-reflex.sh)."

        - alert: AgentErrorFlagged
          expr: github_pull_request_label{label="agent/error"} == 1
          labels:
            severity: warning
          annotations:
            summary: "agent/error on {{ $labels.repo }}#{{ $labels.number }} — automation halted"
            description: "A circuit breaker tripped or an agent flagged an anomaly on https://github.com/{{ $labels.owner }}/{{ $labels.repo }}/pull/{{ $labels.number }}; agent automation skips it until a human removes the label. Read the AGENT_ERROR comment(s) on the PR for what was observed."

        - alert: GithubExporterDown
          expr: up{job="github-exporter"} == 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "github-exporter is not being scraped"
            description: "The GitHub poller pod is down or unreachable for 15m — no CI-failure or billing alerts until it's back. Usually the token Secret is missing (ExternalSecret github-exporter-token) or the pod crashed."

        # Fine-grained PATs expire (≤1y) — this is the rotation reminder. Also catches a
        # revoked token or a GitHub API outage while the pod itself stays healthy.
        - alert: GithubExporterStale
          expr: time() - github_exporter_last_success_timestamp > 1800
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "github-exporter polls are failing"
            description: "No fully successful GitHub poll for 30m+ — likely the PAT expired/was revoked. Re-mint: scripts/github-exporter-pat-bootstrap.sh (docs/github-setup.md §Tokens)."

        # FU-091: queued work + a fully idle loop for 2h = a wedged dispatcher (the 2026-07-21
        # finding: a sidecar zombie held project-WIP for 3 days; every scan said so in logs
        # nobody reads). Different code + token than the scan — fires even when the scan IS the
        # wedged layer. Worker-pod regex: deterministic task keys + legacy timestamp names;
        # eventsource/sensor infra pods deliberately don't match.
        - alert: AgentQueueStalled
          expr: >-
            sum(github_agent_issue_labels{label="agent/queued"}) > 0
            and sum(kube_pod_status_phase{phase=~"Running|Pending", pod=~"agent-.+-(issue|pr)-[0-9]+-r[0-9]+|agent-.+-[0-9]{6}"}) == 0
            and sum(github_pull_request_open) == 0
          for: 2h
          labels:
            severity: warning
          annotations:
            summary: "Agent queue stalled — queued issues but a fully idle loop"
            description: '{{ $value }} agent/queued issue(s) with zero live workers and zero open PRs for 2h — check the coordinate ticks (kubectl -n oracle-agents get wf), the WIP holds in the scan report, and agents/coordinator/TICK-LOG.md for the last incident shape.'
