# provider-upjet-github (FU-068 — the GitHub *Issues tier* in-cluster). Monolithic upjet package
# wrapping terraform-provider-github v6.6.0; the AgentStack Composition composes its
# repo.github.upbound.io IssueLabels (AUTHORITATIVE per-repo label sets — see agentstack.md
# §"The GitHub side"). Credential = the dedicated homelab-labels GitHub App (Issues:R/W only,
# github-providerconfig.yaml) — the Administration tier (repos/rulesets/org secrets) stays in
# out-of-jail tofu/github permanently; this provider can never touch it.
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-upjet-github
spec:
  package: xpkg.upbound.io/crossplane-contrib/provider-upjet-github:v0.19.1
  runtimeConfigRef: { name: github-runtime }
---
# FU-082: the monolithic upjet provider is the biggest BestEffort pod (~145Mi). Requests +
# a limit with headroom (upjet spins per-resource terraform under the hood).
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: github-runtime
spec:
  deploymentTemplate:
    spec:
      selector: {}
      template:
        spec:
          containers:
            - name: package-runtime
              resources:
                requests: { cpu: "100m", memory: "256Mi" }
                limits: { memory: "512Mi" }
