# Dedicated Terraform config for OpenRouter workspaces — kept SEPARATE from the `default`
# ProviderConfig so the community cloudopsworks/openrouter provider can't break the live Garage
# workspaces (their `terraform init` won't try to fetch it). openrouter_* workspaces reference
# this via `providerConfigRef: { name: openrouter }`. Provider creds come from the shared
# provider-terraform pod env (OPENROUTER_API_KEY + INFISICAL_* from runtimeconfig.yaml).
apiVersion: tf.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: openrouter
spec:
  configuration: |
    terraform {
      required_providers {
        openrouter = {
          source  = "cloudopsworks/openrouter"
          version = "~> 0.2"
        }
        infisical = {
          source = "Infisical/infisical"
        }
      }
      backend "kubernetes" {
        secret_suffix     = "openrouter"
        namespace         = "crossplane-system"
        in_cluster_config = true
      }
    }

    # Management API key from the pod env (OPENROUTER_API_KEY) — mints budget-capped runtime keys.
    provider "openrouter" {}

    # Publish minted keys to Infisical (same Universal-Auth creds as the Garage workspaces).
    provider "infisical" {
      host = "http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080"
      auth = {
        universal = {}
      }
    }
