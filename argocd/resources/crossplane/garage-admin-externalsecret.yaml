# Garage admin token → provider-terraform. ESO pulls GARAGE_ADMIN_TOKEN from Infisical
# into a Secret the provider pod reads as GARAGE_TOKEN (see runtimeconfig.yaml). This is
# how the in-cluster reconciler gets the Garage admin credential without it touching git.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garage-admin
  namespace: crossplane-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: garage-admin
  data:
    - secretKey: GARAGE_TOKEN
      remoteRef:
        key: GARAGE_ADMIN_TOKEN
