# OpenRouter MANAGEMENT (provisioning) key → provider-terraform. ESO pulls it from Infisical
# into a Secret the provider pod reads as OPENROUTER_API_KEY (see runtimeconfig.yaml), so
# openrouter_* workspaces can mint per-project budget-capped runtime keys. Tier-0 bootstrap
# secret (peer of GARAGE_ADMIN_TOKEN): create a Provisioning key in OpenRouter (Settings →
# Provisioning Keys), then push it: `devbox run infisical-secret OPENROUTER_MANAGEMENT_KEY=sk-or-…`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openrouter-management
  namespace: crossplane-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: openrouter-management
  data:
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: OPENROUTER_MANAGEMENT_KEY
