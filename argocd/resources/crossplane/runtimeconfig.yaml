# Inject the Garage admin credentials into the provider-terraform pod, so every
# Workspace's `provider "garage" {}` (configured in providerconfig.yaml) authenticates.
# GARAGE_ENDPOINT is the ClusterIP-only admin API on garage-0 (headless-svc DNS, :3903);
# GARAGE_TOKEN comes from the ESO-delivered garage-admin secret.
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: terraform-runtime
spec:
  deploymentTemplate:
    spec:
      selector: {}
      template:
        spec:
          containers:
            - name: package-runtime
              env:
                - name: GARAGE_ENDPOINT
                  value: http://garage-0.garage-headless.garage.svc.cluster.local:3903
                - name: GARAGE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: garage-admin
                      key: GARAGE_TOKEN
                # Infisical write creds — so app Workspaces can publish their generated
                # keys into Infisical (infisical_secret). Identity: crossplane-tf-writer
                # (tofu/infisical), project member. Host is set in the provider block.
                - name: INFISICAL_UNIVERSAL_AUTH_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: infisical-tf-writer
                      key: clientId
                - name: INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: infisical-tf-writer
                      key: clientSecret
                # OpenRouter MANAGEMENT/provisioning key — lets openrouter_* workspaces mint
                # per-project, budget-capped runtime keys. optional: true so the pod still starts
                # before the provisioning key reaches Infisical (the openrouter-management ESO).
                - name: OPENROUTER_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: openrouter-management
                      key: OPENROUTER_API_KEY
                      optional: true
