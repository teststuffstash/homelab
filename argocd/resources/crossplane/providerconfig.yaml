# Base Terraform config injected into every Garage Workspace: the jkossis/garage provider
# (reads GARAGE_ENDPOINT/GARAGE_TOKEN from the pod env, set by runtimeconfig.yaml) and a
# kubernetes backend for state (provider-terraform doesn't persist state itself — each
# workspace's state is a Secret in crossplane-system).
apiVersion: tf.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
spec:
  configuration: |
    terraform {
      required_providers {
        garage = {
          source = "jkossis/garage"
        }
        infisical = {
          source = "Infisical/infisical"
        }
      }
      backend "kubernetes" {
        secret_suffix     = "garage"
        namespace         = "crossplane-system"
        in_cluster_config = true
      }
    }

    provider "garage" {}

    # App Workspaces can publish keys to Infisical. Auth via the crossplane-tf-writer
    # Universal-Auth creds in the pod env (INFISICAL_UNIVERSAL_AUTH_CLIENT_ID/SECRET).
    # Only invoked by workspaces that declare infisical_* resources (others ignore it).
    provider "infisical" {
      host = "http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080"
      auth = {
        universal = {}
      }
    }
