# Pull-through mirror of ghcr.io — sibling of mirror-docker-io.yaml (see its header for the
# design). Anonymous upstream works for public images (all we consume). NB: dockerd's
# registry-mirrors CANNOT use this (Hub-only); ghcr consumers are k3d --registry-config /
# kind containerdConfigPatches / containerd hosts.toml shapes.
# LAN endpoint: http://192.168.40.21 (BGP VIP; also registry-ghcr.registry-cache.svc in-cluster).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mirror-ghcr-data
  namespace: registry-cache
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn-bulk
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mirror-ghcr
  namespace: registry-cache
  labels: { app: mirror-ghcr }
spec:
  replicas: 1
  strategy: { type: Recreate } # RWO volume
  selector:
    matchLabels: { app: mirror-ghcr }
  template:
    metadata:
      labels: { app: mirror-ghcr }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: registry
          image: registry:3.0.0
          env:
            - { name: REGISTRY_PROXY_REMOTEURL, value: "https://ghcr.io" }
            - { name: REGISTRY_PROXY_TTL, value: "168h" }
            - { name: REGISTRY_STORAGE_DELETE_ENABLED, value: "true" }
            - { name: REGISTRY_HTTP_ADDR, value: ":5000" }
          ports:
            - { name: http, containerPort: 5000 }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: data, mountPath: /var/lib/registry }
          readinessProbe:
            httpGet: { path: /v2/, port: 5000 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /v2/, port: 5000 }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "2",    memory: "512Mi" }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: mirror-ghcr-data }
---
apiVersion: v1
kind: Service
metadata:
  name: registry-ghcr
  namespace: registry-cache
  labels:
    app: mirror-ghcr
    bgp: advertise
  annotations:
    lbipam.cilium.io/ips: "192.168.40.21"
spec:
  type: LoadBalancer
  selector: { app: mirror-ghcr }
  ports:
    - { name: http, port: 80, targetPort: 5000 }
