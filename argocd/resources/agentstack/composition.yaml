# AgentStack Composition (FU-048 / ADR-085) — renders the per-repo fixer MECHANISM from a stack's
# AgentStack POLICY. For every spec.repos[] entry with a `fixer` block, into namespace <repo.name>
# (which must already exist — the repo's own deployment owns it, never this XR):
#   1. agents-github-app ExternalSecret        — the GitHub App private key, Infisical → Secret
#   2. agent-git-token-gen GithubAccessToken   — ESO generator: ~1h installation token, THIS repo only
#   3. agent-git-token ExternalSecret          — drives the generator; broker-label on the Secret
#                                                (ADR-087 leg B: proxy /git-token serves it to workers)
#   4. OpenRouterKey <repo>                    — standing budget key; operator writes <repo>-openrouter
#   5. agent-worker-egress CiliumNetworkPolicy — FU-020 lockdown, baseline+profile+extraFQDNs, with the
#                                                monitor→enforce dial (enableDefaultDeny.egress)
#   6. agentstack-proxy-session-keys Role+Binding — ADR-087 leg A: the egress proxy resolves opaque
#                                                refs by reading LABELED session Secrets in this ns.
#                                                Named agentstack-* (NOT openrouter-proxy-session-keys)
#                                                so migration never collided with the retired
#                                                hand-list's same-named Roles (gapless handoff).
# Mirrors (and supersedes, per migrated repo) agents/fixer/<repo>/ and <stack>-iac//<repo>/agent/.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: agentstack
  annotations:
    platform.teststuff.net/docs-url: https://github.com/teststuffstash/homelab/blob/master/docs/agents/agentstack.md
    platform.teststuff.net/docs-configmap: crossplane-system/agentstack-docs
spec:
  compositeTypeRef:
    apiVersion: platform.teststuff.net/v1alpha1
    kind: AgentStack
  mode: Pipeline
  pipeline:
    - step: render
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr := .observed.composite.resource }}
            {{- $profileFQDNs := dict
                  "python" (list "pypi.org" "files.pythonhosted.org")
                  "node"   (list "registry.npmjs.org")
                  "none"   (list) }}
            {{- /* FU-068: the platform label taxonomy — a claim-owned repo's ENTIRE label set is
                 this list + the repo's labels.extra (IssueLabels is AUTHORITATIVE: anything else
                 gets deleted). Three tiers: GitHub defaults (humans use them), the agent state
                 machine (mirror of tofu/github labels.tf — keep in sync until every repo is
                 claim-owned and labels.tf dies), the merge-path/Renovate lanes. */}}
            {{- $platformLabels := list
                  (dict "name" "bug" "color" "d73a4a" "description" "Something isn't working")
                  (dict "name" "documentation" "color" "0075ca" "description" "Improvements or additions to documentation")
                  (dict "name" "duplicate" "color" "cfd3d7" "description" "This issue or pull request already exists")
                  (dict "name" "enhancement" "color" "a2eeef" "description" "New feature or request")
                  (dict "name" "good first issue" "color" "7057ff" "description" "Good for newcomers")
                  (dict "name" "help wanted" "color" "008672" "description" "Extra attention is needed")
                  (dict "name" "invalid" "color" "e4e669" "description" "This doesn't seem right")
                  (dict "name" "question" "color" "d876e3" "description" "Further information is requested")
                  (dict "name" "wontfix" "color" "ffffff" "description" "This will not be worked on")
                  (dict "name" "agent-fix" "color" "0e8a16" "description" "Opt-in: this issue is fair game for the agent fixer")
                  (dict "name" "agent/queued" "color" "fbca04" "description" "Ready to dispatch a worker")
                  (dict "name" "agent/in-progress" "color" "1d76db" "description" "A worker pod is running this round")
                  (dict "name" "agent/review" "color" "5319e7" "description" "PR open, awaiting review (human or agent)")
                  (dict "name" "agent/blocked" "color" "b60205" "description" "Needs a human — budget escalate / max rounds / ambiguous")
                  (dict "name" "agent/done" "color" "0b6b3a" "description" "Merged")
                  (dict "name" "agent/error" "color" "b60205" "description" "Automation anomaly — circuit breaker; agents skip this item until a human clears it")
                  (dict "name" "agent-budget/xs" "color" "c5def5" "description" "Estimator cap-tier override: xs")
                  (dict "name" "agent-budget/sm" "color" "c5def5" "description" "Estimator cap-tier override: sm")
                  (dict "name" "agent-budget/md" "color" "c5def5" "description" "Estimator cap-tier override: md")
                  (dict "name" "agent-budget/lg" "color" "c5def5" "description" "Estimator cap-tier override: lg")
                  (dict "name" "merge-conflict" "color" "e11d21" "description" "PR branch conflicts with master — updater can't auto-resolve; needs a worker re-run or rebase")
                  (dict "name" "major" "color" "b60205" "description" "MAJOR dependency bump — human-gated, coordinator-owned (not the review reflex)")
                  (dict "name" "major/awaiting-human" "color" "d93f0b" "description" "Major bump: migration documented, CI green, reviewer-approved — a human merges")
                  (dict "name" "direction-change" "color" "b60205" "description" "Human reversed direction — sweep (re-scope/close+delete-branch) before any dispatch (C10)")
                  (dict "name" "dependencies" "color" "ededed" "description" "Dependency bump (Renovate)")
                  (dict "name" "automerge" "color" "ededed" "description" "Mechanical dep lane: CI-only approval, no LLM review")
                  (dict "name" "deps-review" "color" "ededed" "description" "Reviewable dep lane: armed + LLM-reviewed (FU-046)") }}
            {{- range $r := $xr.spec.repos }}
            {{- if $r.storage }}
            ---
            # ADR-089 quota-as-contract: the claim's per-tier caps become a ResourceQuota, so an
            # over-cap PVC fails at CREATE with a legible error (instead of wedging unschedulable
            # in Longhorn). Per-StorageClass quota counts PVCs by their RESOLVED class, so
            # default-class PVCs are counted under `longhorn` too.
            apiVersion: v1
            kind: ResourceQuota
            metadata:
              name: agentstack-storage
              namespace: {{ $r.name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ $r.name }}-storage-quota
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              hard:
                longhorn.storageclass.storage.k8s.io/requests.storage: {{ default "0" (get $r.storage "standard") | quote }}
                longhorn-bulk.storageclass.storage.k8s.io/requests.storage: {{ default "0" (get $r.storage "bulk") | quote }}
                longhorn-fast.storageclass.storage.k8s.io/requests.storage: {{ default "0" (get $r.storage "fast") | quote }}
                longhorn-scratch.storageclass.storage.k8s.io/requests.storage: {{ default "0" (get $r.storage "scratch") | quote }}
            {{- end }}
            {{- if $r.labels }}
            ---
            # FU-068 (Issues tier): the repo's AUTHORITATIVE label set — platform taxonomy + the
            # claim's labels.extra. Any label outside this list is DELETED on sync (that is the
            # point: label truth lives here, not in hand-driven tofu). external-name = the repo,
            # so the provider adopts the live set instead of erroring on "exists".
            apiVersion: repo.github.upbound.io/v1alpha1
            kind: IssueLabels
            metadata:
              name: {{ $r.name }}-labels
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ $r.name }}-issue-labels
                crossplane.io/external-name: {{ $r.name }}
            spec:
              providerConfigRef:
                name: github-labels
              forProvider:
                repository: {{ $r.name }}
                label:
                  {{- range $l := concat $platformLabels (default (list) (get $r.labels "extra")) }}
                  - name: {{ get $l "name" | quote }}
                    color: {{ get $l "color" | quote }}
                    {{- if get $l "description" }}
                    description: {{ get $l "description" | quote }}
                    {{- end }}
                  {{- end }}
            {{- end }}
            {{- if $r.fixer }}
            {{- $fx := $r.fixer }}
            {{- /* nested schema defaults only apply when the parent key exists — re-default here */}}
            {{- $eg := default (dict) $fx.egress }}
            {{- $profile := default "none" (get $eg "profile") }}
            {{- $extra := default (list) (get $eg "extraFQDNs") }}
            {{- $enforce := default false (get $eg "enforce") }}
            {{- $docker := default false (get $fx "docker") }}
            ---
            # GitHub App private key, Infisical → Secret (the generator below reads it).
            apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: agents-github-app
              namespace: {{ $r.name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ $r.name }}-github-app-es
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              refreshInterval: 1h
              secretStoreRef: { name: infisical, kind: ClusterSecretStore }
              target:
                name: agents-github-app
                creationPolicy: Owner
                template:
                  engineVersion: v2
                  data:
                    # un-escape Infisical's literal \n → byte-exact PEM
                    privateKey: {{ `'{{ .pem | replace "\\n" "\n" }}'` }}
              data:
                - secretKey: pem
                  remoteRef: { key: AGENTS_GH_APP_PRIVATE_KEY }
            ---
            # Mint a ~1h installation token scoped to THIS repo. appID/installID are the org-wide
            # homelab-agents App constants (platform mechanism; the repositories list does the scoping).
            apiVersion: generators.external-secrets.io/v1alpha1
            kind: GithubAccessToken
            metadata:
              name: agent-git-token-gen
              namespace: {{ $r.name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ $r.name }}-git-token-gen
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              appID: "4150968"
              installID: "142724430"
              auth:
                privateKey:
                  secretRef: { name: agents-github-app, key: privateKey }
              permissions:
                contents: write
                pull_requests: write
                issues: write # fixer reads the issue; agent-finalize posts strike/stats IN-POD (FU-064/043)
              repositories:
                - {{ $r.name }}
            ---
            # Drive the generator → the Secret the broker serves (key: token). refresh < the ~1h TTL.
            apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: agent-git-token
              namespace: {{ $r.name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ $r.name }}-git-token-es
            spec:
              refreshInterval: 45m
              target:
                name: agent-git-token
                creationPolicy: Owner
                template:
                  metadata:
                    labels:
                      # ADR-087 leg B: proxy /git-token serves this to worker pods (label-checked).
                      homelab.teststuff.net/agent-git-token: "true"
              dataFrom:
                - sourceRef:
                    generatorRef:
                      apiVersion: generators.external-secrets.io/v1alpha1
                      kind: GithubAccessToken
                      name: agent-git-token-gen
            {{- if default false (get $fx "claudeTier") }}
            ---
            # FU-066 leg (a): the claude-tier session secret — the subscription oauth token,
            # Infisical → Secret, session-key-labeled so the egress proxy's /anthropic upstream
            # resolves ref:<ns>/claude-session and injects it (ADR-087 leg A; the pod never holds
            # the token). Replaced the operator-imperative `kubectl create secret` (oracle-fleet
            # was the only one) — observed on the 2026-07-16 cutover: ESO creationPolicy Owner
            # ADOPTED the pre-existing hand-made Secret in place (ownerRef + managed label set,
            # no deletion needed) — unlike Crossplane, which refuses to adopt (agentstack.md
            # §Operational notes still applies to composed non-ESO kinds). Real Ready condition
            # kept (like agent-git-token): AgentStack READY ⇒ the token materialized.
            apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: claude-session
              namespace: {{ $r.name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ $r.name }}-claude-session-es
            spec:
              refreshInterval: 1h
              secretStoreRef: { name: infisical, kind: ClusterSecretStore }
              target:
                name: claude-session
                creationPolicy: Owner
                template:
                  metadata:
                    labels:
                      openrouter.teststuff.net/session-key: "true"
              data:
                - secretKey: AUTH_TOKEN
                  remoteRef: { key: COORDINATOR_CLAUDE_OAUTH_TOKEN }
            {{- end }}
            ---
            # Standing funding ceiling — the operator mints the key and writes Secret <repo>-openrouter;
            # per-session ephemeral keys budget underneath it.
            apiVersion: openrouter.teststuff.net/v1alpha1
            kind: OpenRouterKey
            metadata:
              name: {{ $r.name }}
              namespace: {{ $r.name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ $r.name }}-openrouter-key
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              project: {{ $r.name }}
              budgetUSD: {{ default 5.0 (get $fx "budgetUSD") }}
              resetInterval: {{ default "weekly" (get $fx "resetInterval") }}
              {{- $guardrail := default "only-free" (get $fx "guardrail") }}
              {{- if ne $guardrail "none" }}
              guardrail: {{ $guardrail }}
              {{- end }}
            ---
            # FU-020/ADR-081 worker egress. Selector hits ONLY agent pods; the app's own workloads are
            # untouched. enforce=false → monitor (allowlist evaluated + DNS visibility, nothing blocked).
            apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              name: agent-worker-egress
              namespace: {{ $r.name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ $r.name }}-egress-cnp
                gotemplating.fn.crossplane.io/ready: "True"
            spec:
              endpointSelector:
                matchLabels:
                  app: agent-session
              {{- if not $enforce }}
              # MONITOR phase: rules attach (DNS visibility for the Hubble harvest) but the default
              # deny does not. Flip spec...egress.enforce=true in the AgentStack after clean rides.
              enableDefaultDeny:
                egress: false
              {{- end }}
              egress:
                - toEndpoints:
                    - matchLabels:
                        k8s:io.kubernetes.pod.namespace: kube-system
                        k8s-app: kube-dns
                  toPorts:
                    - ports:
                        - { port: "53", protocol: UDP }
                        - { port: "53", protocol: TCP }
                      rules:
                        dns:
                          - matchPattern: "*"
                {{- if $docker }}
                # docker=true: kata worker pods run dnsPolicy None + the LAN resolver (the FU-072
                # service-VIP gap), so DNS leaves to the router — keep the L7 dns rule so toFQDNs
                # visibility/allowlisting still works on that path.
                - toCIDR:
                    - 192.168.2.1/32
                  toPorts:
                    - ports:
                        - { port: "53", protocol: UDP }
                        - { port: "53", protocol: TCP }
                      rules:
                        dns:
                          - matchPattern: "*"
                # docker=true: the pull-through registry mirrors (FU-073, registry-cache ns).
                # Hubble-verified 2026-07-14: even from a kata guest, pod→LB-VIP traffic is
                # DNAT'd to the backend BEFORE policy evaluation, so the identity rule below is
                # the one that matches; the VIP CIDRs stay as a belt for any untranslated path.
                - toEndpoints:
                    - matchLabels:
                        k8s:io.kubernetes.pod.namespace: registry-cache
                - toCIDR:
                    - 192.168.40.20/32
                    - 192.168.40.21/32
                    - 192.168.40.23/32 # nix-cache VIP (FU-073e) — kata rides install via it
                  toPorts:
                    - ports:
                        - { port: "80", protocol: TCP }
                {{- end }}
                - toEndpoints: # the proxy + git-cred broker: the ONLY LLM/credential exit
                    - matchLabels:
                        k8s:io.kubernetes.pod.namespace: agent-egress
                - toEndpoints: # devbox installs via the in-cluster pull-through cache (ADR-083)
                    - matchLabels:
                        k8s:io.kubernetes.pod.namespace: nix-cache
                - toEndpoints: # transcript uploads (agent-finalize)
                    - matchLabels:
                        k8s:io.kubernetes.pod.namespace: garage
                - toEndpoints: # pushgateway run metrics (FU-057)
                    - matchLabels:
                        k8s:io.kubernetes.pod.namespace: monitoring
                - toFQDNs:
                    # baseline: git over TLS + nix upstream fallback. NO openrouter.ai — direct LLM
                    # egress is the thing this policy forbids.
                    - { matchName: github.com }
                    - { matchName: api.github.com }
                    - { matchName: codeload.github.com }
                    - { matchPattern: "*.githubusercontent.com" }
                    - { matchName: cache.nixos.org }
                    {{- range $f := get $profileFQDNs $profile }}
                    - { matchName: {{ $f }} } # profile: {{ $profile }}
                    {{- end }}
                    {{- range $f := $extra }}
                    - { matchName: {{ $f }} } # extraFQDNs (earned from a monitor-phase harvest)
                    {{- end }}
                    {{- if $docker }}
                    # docker=true: docker.io pulls ride the FU-073 mirror (toCIDR above) since
                    # 2026-07-14 — the registry-1/auth/CDN FQDNs are gone (that tightening is the
                    # point of the mirrors; mirror down ⇒ pulls drop loudly, not fall back).
                    # ghcr.io stays: dockerd's registry-mirrors is Hub-only, so the dind's own
                    # pulls of ghcr images (k3d-proxy/k3d-tools) go direct until the gate configs
                    # route ghcr through the mirror per-tool.
                    - { matchName: ghcr.io }
                    {{- end }}
                  toPorts:
                    - ports:
                        - { port: "443", protocol: TCP }
            ---
            # ADR-087 leg A: the egress proxy resolves ref:<ns>/<secret> by reading LABELED session
            # Secrets here. Verb is get only; the proxy code additionally checks the session-key label.
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              name: agentstack-proxy-session-keys
              namespace: {{ $r.name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ $r.name }}-proxy-role
                gotemplating.fn.crossplane.io/ready: "True"
            rules:
              - apiGroups: [""]
                resources: [secrets]
                verbs: [get]
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              name: agentstack-proxy-session-keys
              namespace: {{ $r.name }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: {{ $r.name }}-proxy-rolebinding
                gotemplating.fn.crossplane.io/ready: "True"
            roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: agentstack-proxy-session-keys }
            subjects:
              - { kind: ServiceAccount, name: openrouter-proxy, namespace: agent-egress }
            {{- end }}
            {{- end }}
            ---
            # Mirror the watched-repo list into status for quick kubectl reads.
            apiVersion: platform.teststuff.net/v1alpha1
            kind: AgentStack
            status:
              repos:
                {{- range $r := $xr.spec.repos }}
                - {{ $r.name }}
                {{- end }}
    - step: ready
      functionRef:
        name: function-auto-ready
