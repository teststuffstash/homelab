# sleep-tracking app-owned Garage resources (ADR-004 per-app-repo): the Crossplane Workspace
# (adopts the buckets/keys via import, deletionPolicy Orphan) + the ESO ExternalSecrets that
# deliver the ingester's Garage keys and the Forgejo registry pull secret. Reconciled from the
# sleep-tracking repo's infra/. Part of the **sleep** app-of-apps (tofu/argocd.tf), separate from
# platform. Depends on platform being up (ESO operator + ClusterSecretStore + Crossplane
# provider-terraform) — ArgoCD retries until those exist.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sleep-tracking
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/teststuffstash/sleep-tracking.git
    targetRevision: master
    path: infra
    directory: { recurse: false }
  destination:
    server: https://kubernetes.default.svc
    namespace: sleep-tracking
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 10
      backoff: { duration: 15s, factor: 2, maxDuration: 5m }
