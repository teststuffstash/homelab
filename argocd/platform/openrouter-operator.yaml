# openrouter-operator (kopf) — manages OpenRouter API keys/budgets/guardrails as OpenRouterKey CRs.
# Reconciled from the openrouter-operator repo's deploy/ (CRD + RBAC + ESO + Deployment). Wave 5 —
# after platform (ESO/Infisical/ClusterSecretStore) so the management-key ExternalSecret resolves.
# Replaces the buggy cloudopsworks TF provider path (issue #20) with a typed, tested controller.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openrouter-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/teststuffstash/openrouter-operator.git
    targetRevision: master
    path: deploy
    directory: { recurse: false }
  destination:
    server: https://kubernetes.default.svc
    namespace: openrouter-operator
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # the CRD can be large; SSA avoids the last-applied annotation limit
    retry:
      limit: 10
      backoff: { duration: 15s, factor: 2, maxDuration: 5m }
