# CloudNativePG operator — the Postgres control plane. Wave 0: nothing here depends
# on it yet, but the Postgres Cluster (wave 1) needs its CRDs Established first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: 0.28.3
    helm:
      valuesObject:
        crds:
          create: true
        # FU-082: the operator reconciles every CNPG cluster — shouldn't be OOM-first. ~72Mi steady.
        resources:
          requests: { cpu: "50m", memory: "128Mi" }
          limits: { memory: "256Mi" }
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # the operator CRDs are large
    retry:
      limit: 5
      backoff: { duration: 10s, factor: 2, maxDuration: 3m }
