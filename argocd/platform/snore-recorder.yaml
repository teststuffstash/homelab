# snore-recorder's app-owned Garage resources (ADR-004 per-app-repo): ArgoCD reconciles
# the Crossplane Workspace from the snore-recorder repo. Wave 5 — after provider-terraform
# + ProviderConfig (crossplane-providers, wave 4) are ready. The Workspace creates the
# sleep-snore bucket + write key; the key is published to Infisical (see push-secret).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snore-recorder
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/teststuffstash/snore-recorder.git
    targetRevision: master
    path: infra
    directory: { recurse: false }
  destination:
    server: https://kubernetes.default.svc
    namespace: snore-recorder
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff: { duration: 15s, factor: 2, maxDuration: 5m }
