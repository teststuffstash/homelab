# Crossplane core — the in-cluster reconciler for app-owned platform resources (ADR-075
# steady state). With provider-terraform (argocd/resources/crossplane/) it reconciles
# Garage buckets/keys from a TF module, so app resource creation becomes GitOps instead
# of manual app-repo tofu. Wave 1: independent of the secret stack, but its Workspaces
# consume the Garage admin token via ESO, so it comes up alongside.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://charts.crossplane.io/stable
    chart: crossplane
    targetRevision: 2.3.2
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # large CRDs
    retry:
      limit: 5
      backoff: { duration: 10s, factor: 2, maxDuration: 3m }
