# sleep-tracking's app-owned Garage resources (ADR-004 per-app-repo): ArgoCD reconciles
# the Crossplane Workspace + the ESO ExternalSecret from the sleep-tracking repo. Wave 5
# (after provider-terraform, wave 4). The Workspace ADOPTS existing buckets/keys via import
# (deletionPolicy: Orphan — never destroys the sleep-db history). Note: this manages only
# the app's infra/ (buckets/keys + credential delivery), not the ingester Helm release.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sleep-tracking
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/teststuffstash/sleep-tracking.git
    targetRevision: master
    path: infra
    directory: { recurse: false }
  destination:
    server: https://kubernetes.default.svc
    namespace: sleep-tracking
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff: { duration: 15s, factor: 2, maxDuration: 5m }
