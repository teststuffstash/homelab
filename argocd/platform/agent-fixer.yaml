# agent-fixer ApplicationSet — GitOps-manages every repo's FIXER-FLOW infra (per-project OpenRouterKey
# budget key + agent-git-token ESO GithubAccessToken + worker NetworkPolicies) from ONE templated set
# (the "yaml way", FU-052). Two dir shapes feed it:
#   homelab  agents/fixer/<repo>/   (platform-side repos)       → repo = path basename
#   <stack>-iac  <repo>/agent/      (stack policy in the stack — ADR-084/FU-025; GitOps-orphaned
#                                    until 2026-07-10, TICK-LOG meta-3) → repo = path segment 0
# ⚠ Generator-level template overrides do NOT reliably beat the spec template (duplicate-name
# incident, meta-5) — so ONE uniform spec template derives repo/namespace from the dir shape, and
# only the repoURL varies via generator `values`.
#
# Wave 6 (child apps) — after openrouter-operator (wave 5) provides the OpenRouterKey CRD + ESO/
# Infisical/ClusterSecretStore are up. Registered by the platform root app-of-apps (argocd/README.md).
# Fuller endgame folds the GitHub-side (repos/labels/rulesets/callers) in too → FU-048 AgentStack XRD.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: agent-fixer
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/teststuffstash/homelab.git
        revision: master
        directories:
          - path: agents/fixer/*
        values:
          repoURL: https://github.com/teststuffstash/homelab.git
    - git:
        repoURL: https://github.com/teststuffstash/oracle-iac.git
        revision: master
        directories:
          - path: "*/agent"
        values:
          repoURL: https://github.com/teststuffstash/oracle-iac.git
    - git:
        repoURL: https://github.com/teststuffstash/sleep-iac.git
        revision: master
        directories:
          - path: "*/agent"
        values:
          repoURL: https://github.com/teststuffstash/sleep-iac.git
  template:
    metadata:
      name: 'agent-fixer-{{if eq .path.basename "agent"}}{{index .path.segments 0}}{{else}}{{.path.basename}}{{end}}'
      annotations:
        argocd.argoproj.io/sync-wave: "6"
    spec:
      project: default
      source:
        repoURL: "{{.values.repoURL}}"
        targetRevision: master
        path: "{{.path.path}}"
        directory: { recurse: false }
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{if eq .path.basename "agent"}}{{index .path.segments 0}}{{else}}{{.path.basename}}{{end}}'
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions:
          - ServerSideApply=true
        retry:
          limit: 5
          backoff: { duration: 15s, factor: 2, maxDuration: 5m }
