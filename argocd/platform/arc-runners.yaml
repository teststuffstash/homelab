# The runner scale set — ephemeral GitHub Actions runners registered org-wide on teststuffstash.
# Workflows target them with `runs-on: homelab-ephemeral`. Scale-to-zero (minRunners 0); a job
# spins an ephemeral pod, it runs, then it's torn down. Pinned to the ephemeral laptop tier so CI
# noise/privilege stays off the service nodes (same tier as the Forgejo runner).
#
# Wave 5 — after github-runner-secrets (wave 4) creates the arc-runners ns + the arc-github-app
# Secret (ESO). Version MUST match arc-controller.yaml.
#
# containerMode: dind → jobs get a Docker daemon (Talos has no host docker socket); the chart adds
# a privileged dind sidecar, hence the ns PodSecurity=privileged label. NOTE: this runner is
# linux/amd64 — it can build the (amd64) sleep-ingester image, but NOT snore-recorder's arm64 image
# (the Talos kernel has no binfmt_misc); that one still builds off-cluster. See docs/ci.md.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runners
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: 0.14.2 # keep in lockstep with arc-controller.yaml
    helm:
      valuesObject:
        githubConfigUrl: https://github.com/teststuffstash
        githubConfigSecret: arc-github-app
        # Point the scale set at the controller's SA explicitly. The chart otherwise tries to
        # DISCOVER it by label at template time — which fails under ArgoCD's `helm template`
        # (no cluster lookup): "No gha-rs-controller deployment found using label
        # app.kubernetes.io/part-of=gha-rs-controller". Must match arc-controller (arc-systems).
        controllerServiceAccount:
          namespace: arc-systems
          name: arc-controller-gha-rs-controller
        runnerScaleSetName: homelab-ephemeral
        minRunners: 0
        # 2 ephemeral nodes (wk-metal-01/-02, ~4 CPU + 7 GB each); runner pods request no resources, so
        # THIS cap — not node capacity — is what pinned concurrency to 2 (one runner per node). Bumped to
        # 4 (≈2 dind runners per metal node): free headroom for the light jobs (ci/deploy/renovate/
        # devbox-update). Watch memory on the old ThinkPads under concurrent heavy builds; go higher only
        # by ADDING ephemeral capacity (another quiet node, or a Proxmox VM runner à la ADR-082), not by
        # overpacking these two.
        maxRunners: 4
        containerMode:
          type: dind
        template:
          spec:
            nodeSelector:
              homelab.io/ephemeral: "true"
            tolerations:
              - key: homelab.io/ephemeral
                operator: Exists
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 5
      backoff: { duration: 15s, factor: 2, maxDuration: 5m }
