# Raw manifests for the GitHub runner: the `arc-runners` namespace (PodSecurity=privileged, for
# the dind runner pods) + the ESO ExternalSecret that renders the GitHub App credential ARC uses
# to register runners. Wave 4 — after the ESO ClusterSecretStore (platform-extras, wave 3) exists.
#
# BOOTSTRAP: scripted — `scripts/github-runner-bootstrap.sh` (docs/github-runner-bootstrap.md).
# It creates the org GitHub App (Organization > Self-hosted runners: R/W, + Metadata: Read) via the
# App-manifest REST flow, then pushes GHARC_APP_ID / GHARC_INSTALL_ID / GHARC_PRIVATE_KEY (+ the ghcr
# SLEEP_GHCR_PULL_TOKEN) into Infisical homelab/prod. The only manual clicks: "Create" + "Install" the
# App, and minting the ghcr read:packages PAT.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: github-runner-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/teststuffstash/homelab.git
    targetRevision: master
    path: argocd/resources/github-runner
    directory: { recurse: false }
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff: { duration: 15s, factor: 2, maxDuration: 5m }
