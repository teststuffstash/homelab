# Platform-precreated namespace for the oracle tenant (docs/oracle-iac.md; pattern from
# sleep-namespaces.yaml). homelab owns namespace lifecycle; the `oracle` AppProject only
# *allowlists* it as a destination, and the child apps run CreateNamespace=false — the tenant
# cannot spawn arbitrary namespaces.
apiVersion: v1
kind: Namespace
metadata:
  name: oracle-fleet
  labels:
    # AgentStack fixer.docker=true workers run a privileged dind sidecar — privileged only
    # INSIDE the kata microVM (root in the guest, not the node). PodSecurity can't see runtime
    # classes, so the apiserver admission config exempts the kata runtimeClass (FU-077,
    # tofu/talos.tf) — kata pods bypass PSS surgically and the namespace stays at the
    # cluster-default baseline; a privileged RUNC pod here is still rejected (tested live
    # 2026-07-16). Labels pinned explicitly so the posture is visible in git.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
  annotations:
    argocd.argoproj.io/sync-wave: "-1" # before the oracle child apps deploy into it
