# Platform-precreated namespace for the oracle tenant (docs/oracle-iac.md; pattern from
# sleep-namespaces.yaml). homelab owns namespace lifecycle; the `oracle` AppProject only
# *allowlists* it as a destination, and the child apps run CreateNamespace=false — the tenant
# cannot spawn arbitrary namespaces.
apiVersion: v1
kind: Namespace
metadata:
  name: oracle-fleet
  labels:
    # AgentStack fixer.docker=true workers run a privileged dind sidecar — privileged only
    # INSIDE the kata microVM (root in the guest, not the node), but PodSecurity can't see
    # runtime classes, so the namespace opts up (the forgejo-runner/monitoring pattern).
    # FU-077 tracks the surgical fix: a PodSecurity runtimeClass exemption for kata in the
    # apiserver admission config — then these labels revert to baseline.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
  annotations:
    argocd.argoproj.io/sync-wave: "-1" # before the oracle child apps deploy into it
