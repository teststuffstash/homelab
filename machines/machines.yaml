# Homelab machine inventory + benchmarks. Single source of truth — expand freely, then
# regenerate the tables with:  python3 machines/generate.py   (writes machines/README.md + .html)
#
# Benchmark = stress-ng `--cpu N --cpu-method matrixprod` bogo-ops/s (synthetic; only comparable
# across these runs, not a real-world score). See docs/power-measurements.md for the method.
# Derived columns (perf/W, load delta) are computed by the generator — don't hand-edit them.
#
# Fields (leave null/omit what's not measured yet):
#   name, role, hardware, cpu_cores (logical), memory_gb, ip, plug (HA entity),
#   idle_w, load_w, singlecore_bogo_s, multicore_bogo_s, remote_power, notes
#
# remote_power = how the box is powered on/cycled remotely (WoL, smart-plug, hypervisor, …).
# Matters for power-loss recovery — see docs/runbook.md "Power-loss / ghost-node recovery".

machines:
  - name: pve
    role: Proxmox hypervisor (hosts the Talos VMs + Matchbox LXC)
    hardware: AliExpress X99 + Intel Xeon E5-2680 v4
    cpu_cores: 28        # 14C / 28T
    memory_gb: 64
    ip: 192.168.2.3
    plug: sensor.plug_pve_power
    idle_w: 127
    load_w: null
    singlecore_bogo_s: null
    multicore_bogo_s: null
    notes: Idle figure is from the dashboard; not stress-tested (don't want to stress the hypervisor).

  - name: opnsense
    role: Router / firewall / DHCP / DNS / FRR / HAProxy
    hardware: HP desktop ("Big Data")
    cpu_cores: 4         # i5-2500
    memory_gb: 8
    ip: 192.168.2.1
    plug: sensor.plug_opnsense_power
    idle_w: 57
    load_w: null
    singlecore_bogo_s: null
    multicore_bogo_s: null
    notes: Not stress-tested (production router).

  - name: thinkcentre
    role: k8s worker (storage tier + Optane fast tier)
    hardware: Lenovo ThinkCentre Edge
    cpu_cores: 2
    memory_gb: 4
    ip: 192.168.2.53
    plug: sensor.plug_konditsioneer_power
    idle_w: 27.9
    load_w: 54.5
    singlecore_bogo_s: 1200.4
    multicore_bogo_s: 2231.7
    remote_power: smart-plug (switch.konditsioneer_socket); auto-boots on AC restore — NOT WoL
    notes: >-
      Desktop — highest absolute throughput of the tested boxes, but thirsty.
      WoL is not the control path: BIOS is set to power-on after AC loss, so the box never rests
      in S5 (a magic packet sent 2026-06-09 while the plug was ON found it already at full idle
      draw, ~28 W, not waiting in standby). Remote power = cycle switch.konditsioneer_socket via
      Home Assistant; it boots when AC returns. NIC-level WoL support is therefore unverified
      (Talos ships no ethtool) and moot for this box.

  - name: wk-metal-01
    role: k8s worker (ephemeral / compute tier, tainted)
    hardware: Lenovo ThinkPad X240
    cpu_cores: 4         # 2C / 4T
    memory_gb: 8
    ip: 192.168.2.182
    plug: sensor.plug_laptop3_power
    idle_w: 9.1
    load_w: 28.8
    singlecore_bogo_s: 1182.1
    multicore_bogo_s: 1932.2
    notes: Most power-efficient tested. AC draw is battery-buffered + power-capped (~29 W flat).

  - name: wk-metal-02
    role: k8s worker (ephemeral / compute tier, tainted)
    hardware: Lenovo ThinkPad X250
    cpu_cores: 4
    memory_gb: 8
    ip: 192.168.2.183
    plug: sensor.plug_laptop4_power
    idle_w: null
    load_w: null
    singlecore_bogo_s: null
    multicore_bogo_s: null
    notes: Not yet stress-tested — matched-pair candidate vs the X240.

  - name: hp-01
    role: k8s worker (storage tier, WoL-capable)
    hardware: HP desktop
    cpu_cores: null
    memory_gb: 8
    ip: 192.168.2.54
    plug: null
    idle_w: null
    load_w: null
    singlecore_bogo_s: null
    multicore_bogo_s: null
    remote_power: Wake-on-LAN (PXE-booted; no smart plug)
    notes: No smart plug — power not measurable from here.
