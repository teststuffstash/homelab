# Homelab machine inventory + benchmarks. Single source of truth — expand freely, then
# regenerate the tables with:  python3 machines/generate.py   (writes machines/README.md + .html)
#
# Benchmark = stress-ng `--cpu N --cpu-method matrixprod` bogo-ops/s (synthetic; only comparable
# across these runs, not a real-world score). See docs/power-measurements.md for the method.
# Derived columns (perf/W, load delta) are computed by the generator — don't hand-edit them.
#
# Fields (leave null/omit what's not measured yet):
#   name, role, hardware, cpu_cores (logical), memory_gb, ip, plug (HA entity),
#   idle_w, load_w, singlecore_bogo_s, multicore_bogo_s, notes

machines:
  - name: pve
    role: Proxmox hypervisor (hosts the Talos VMs + Matchbox LXC)
    hardware: AliExpress X99 + Intel Xeon E5-2680 v4
    cpu_cores: 28        # 14C / 28T
    memory_gb: 64
    ip: 192.168.2.3
    plug: sensor.plug_pve_power
    idle_w: 127
    load_w: null
    singlecore_bogo_s: null
    multicore_bogo_s: null
    notes: Idle figure is from the dashboard; not stress-tested (don't want to stress the hypervisor).

  - name: opnsense
    role: Router / firewall / DHCP / DNS / FRR / HAProxy
    hardware: HP desktop ("Big Data")
    cpu_cores: 4         # i5-2500
    memory_gb: 8
    ip: 192.168.2.1
    plug: sensor.plug_opnsense_power
    idle_w: 57
    load_w: null
    singlecore_bogo_s: null
    multicore_bogo_s: null
    notes: Not stress-tested (production router).

  - name: thinkcentre
