substitutions:
  name: droplet
  # --- watering behaviour (tune here) ---
  watering_seconds: "60"   # FALLBACK only — per-plant run time is set in HA (input_number.watering_seconds_pumpN)
  soak_seconds: "10"       # pause between plants in a cycle
  check_interval: "15min"  # how often to evaluate whether to water
  day_start: "8"           # only water at/after 08:00 ...
  day_end: "21"            # ... and before 21:00 (no buzzing/watering at night)

esphome:
  name: droplettest
  friendly_name: droplettest
  name_add_mac_suffix: false   # single device; stable node name so HA reconnects to the same integration
  project:
    name: pricelesstoolkit.droplet
    version: "1.1"
  on_boot:
    priority: -100
    then:
      - lambda: id(oled).turn_off();

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

ota:
  - platform: esphome
    password: !secret ota_password   # must match the device's current OTA password to upload

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  ap:
    ssid: "Droplettest Fallback Hotspot"
    password: "password"

captive_portal:

# Time source (for the daytime guard). SNTP from the OPNsense gateway (local-first,
# works WAN-down) with public fallback. NOTE: the `homeassistant` time platform
# returns UTC and ignores `timezone:`, which broke the daytime window — SNTP honours it.
time:
  - platform: sntp
    id: ha_time
    timezone: "EET-2EEST,M3.5.0/3,M10.5.0/4"   # Europe/Tallinn (POSIX)
    servers:
      - 192.168.2.1        # OPNsense NTP (LAN)
      - 0.pool.ntp.org
      - 1.pool.ntp.org

one_wire: # https://esphome.io/components/one_wire
  - platform: gpio
    pin: GPIO25

i2c: # i2c Pins
  sda: 21
  scl: 22
  scan: true

mcp23017: # Expansion Board  https://esphome.io/components/mcp230xx.html
  - id: mcp23017_hub
    address: 0x20

font: # Fonts for Display
  - file: arial.ttf
    id: font1
    size: 8
  - file: arial.ttf
    id: font2
    size: 10
  - file: arial.ttf
    id: font3
    size: 14

display: # https://esphome.io/components/display/ssd1306.html
  - platform: ssd1306_i2c
    id: oled
    model: SSD1306 128x64
    address: 0x3C
    lambda: |-
      it.printf(2, 0, id(font2), TextAlign::TOP_LEFT, "DROPLET");
      it.printf(61, 0, id(font2), "%.0f", id(dbm).state);
      it.line(0, 12, 98, 12);
      it.line(98, 0, 98, 64);
      it.printf(2, 14, id(font2), "auto: %s", id(auto_watering).state ? "ON" : "off");
      it.printf(102, 0,  id(font2), "%.0f", id(Soil1).state);
      it.printf(102, 14, id(font2), "%.0f", id(Soil2).state);
      it.printf(102, 28, id(font2), "%.0f", id(Soil3).state);
      it.printf(102, 42, id(font2), "%.0f", id(Soil4).state);

# Integrated BUZZER (GPIO23, jumper 1). Only sounds when the play_rtttl service is called —
# nothing here buzzes on its own.
rtttl:
  output: rtttl_out
  on_finished_playback:
    - logger.log: Song ended!

api:
  services:
    - service: play_rtttl
      variables:
        song_str: string
      then:
        - rtttl.play:
            rtttl: !lambda 'return song_str;'
  encryption:
    key: "2PdhhSba8dsBSCZ2bYKxXmGoxpiOEVZ9S2LBzGD0tJ0="

# Per-pump cumulative run-time (time proxy for water used; no flow meter on this rig).
# pumpN_seconds_total is a monotonic counter persisted to flash (survives reboots);
# pumpN_on_ms holds the start millis() while a pump is running (runtime only).
globals:
  - { id: pump1_on_ms, type: uint32_t, restore_value: no, initial_value: '0' }
  - { id: pump2_on_ms, type: uint32_t, restore_value: no, initial_value: '0' }
  - { id: pump3_on_ms, type: uint32_t, restore_value: no, initial_value: '0' }
  - { id: pump4_on_ms, type: uint32_t, restore_value: no, initial_value: '0' }
  - { id: pump1_seconds_total, type: double, restore_value: yes, initial_value: '0' }
  - { id: pump2_seconds_total, type: double, restore_value: yes, initial_value: '0' }
  - { id: pump3_seconds_total, type: double, restore_value: yes, initial_value: '0' }
  - { id: pump4_seconds_total, type: double, restore_value: yes, initial_value: '0' }

sensor:
  # --- Raw ADC voltage per channel (calibration aid; disabled in HA by default) ---
  - { platform: adc, pin: { number: 34, allow_other_uses: true }, id: soil1_raw, name: "${name} Soil1 raw", attenuation: 12db, unit_of_measurement: V, accuracy_decimals: 3, update_interval: 5s, entity_category: diagnostic, disabled_by_default: true }
  - { platform: adc, pin: { number: 35, allow_other_uses: true }, id: soil2_raw, name: "${name} Soil2 raw", attenuation: 12db, unit_of_measurement: V, accuracy_decimals: 3, update_interval: 5s, entity_category: diagnostic, disabled_by_default: true }
  - { platform: adc, pin: { number: 32, allow_other_uses: true }, id: soil3_raw, name: "${name} Soil3 raw", attenuation: 12db, unit_of_measurement: V, accuracy_decimals: 3, update_interval: 5s, entity_category: diagnostic, disabled_by_default: true }
  - { platform: adc, pin: { number: 33, allow_other_uses: true }, id: soil4_raw, name: "${name} Soil4 raw", attenuation: 12db, unit_of_measurement: V, accuracy_decimals: 3, update_interval: 5s, entity_category: diagnostic, disabled_by_default: true }

  # --- Soil moisture, one ADC per plant (1-4) ---
  - platform: adc
    pin: { number: 34, allow_other_uses: true }
    id: Soil1
    name: ${name} SoilM Sens 1
    icon: mdi:water-percent
    update_interval: 60s   # 1-min reporting: plenty for soil + cuts WiFi airtime. Control loop reads .state inside do_water_cycle (every 15 min), so this resolution is ample.
    unit_of_measurement: '%'
    attenuation: 12db
    filters:
      - calibrate_linear:
          - 2.300 -> 0.00      # Calibrate Min in dry soil
          - 0.89 -> 100.00     # Calibrate MAX in 100% wet soil
      - clamp: { min_value: 0, max_value: 100 }
    accuracy_decimals: 0

  - platform: adc
    pin: { number: 35, allow_other_uses: true }
    id: Soil2
    name: ${name} SoilM Sens 2
    icon: mdi:water-percent
    update_interval: 60s   # 1-min reporting: plenty for soil + cuts WiFi airtime. Control loop reads .state inside do_water_cycle (every 15 min), so this resolution is ample.
    unit_of_measurement: '%'
    attenuation: 12db
    filters:
      - calibrate_linear:
          - 2.300 -> 0.00
          - 0.89 -> 100.00
      - clamp: { min_value: 0, max_value: 100 }
    accuracy_decimals: 0

  - platform: adc
    pin: { number: 32, allow_other_uses: true }
    id: Soil3
    name: ${name} SoilM Sens 3
    icon: mdi:water-percent
    update_interval: 60s   # 1-min reporting: plenty for soil + cuts WiFi airtime. Control loop reads .state inside do_water_cycle (every 15 min), so this resolution is ample.
    unit_of_measurement: '%'
    attenuation: 12db
    filters:
      - calibrate_linear:
          - 2.300 -> 0.00
          - 0.89 -> 100.00
      - clamp: { min_value: 0, max_value: 100 }
    accuracy_decimals: 0

  - platform: adc
    pin: { number: 33, allow_other_uses: true }
    id: Soil4
    name: ${name} SoilM Sens 4
    icon: mdi:water-percent
    update_interval: 60s   # 1-min reporting: plenty for soil + cuts WiFi airtime. Control loop reads .state inside do_water_cycle (every 15 min), so this resolution is ample.
    unit_of_measurement: '%'
    attenuation: 12db
    filters:
      - calibrate_linear:
          - 2.300 -> 0.00
          - 0.89 -> 100.00
      - clamp: { min_value: 0, max_value: 100 }
    accuracy_decimals: 0

  # --- Desired moisture per plant, driven by Home Assistant helpers ---
  # Water runs while Soil < this value. Set to 0 to disable a plant.
  - platform: homeassistant
    id: desired_mois_value_1
    internal: true
    entity_id: input_number.moisture_level_for_pump1
  - platform: homeassistant
    id: desired_mois_value_2
    internal: true
    entity_id: input_number.moisture_level_for_pump2
  - platform: homeassistant
    id: desired_mois_value_3
    internal: true
    entity_id: input_number.moisture_level_for_pump3
  - platform: homeassistant
    id: desired_mois_value_4
    internal: true
    entity_id: input_number.moisture_level_for_pump4

  # --- Per-plant watering run time (seconds), driven by Home Assistant helpers ---
  # Bigger pots / soaker-hose priming need longer. Falls back to ${watering_seconds}
  # if the HA value is unavailable.
  - platform: homeassistant
    id: water_secs_1
    internal: true
    entity_id: input_number.watering_seconds_pump1
  - platform: homeassistant
    id: water_secs_2
    internal: true
    entity_id: input_number.watering_seconds_pump2
  - platform: homeassistant
    id: water_secs_3
    internal: true
    entity_id: input_number.watering_seconds_pump3
  - platform: homeassistant
    id: water_secs_4
    internal: true
    entity_id: input_number.watering_seconds_pump4

  - platform: wifi_signal
    name: ${name} WiFi Signal Sensor
    id: dbm
    update_interval: 60s

  - platform: uptime
    name: ${name} Uptime
    update_interval: 3600s

  # --- Per-pump cumulative run-time (seconds) — the "water used" time proxy. ---
  # total_increasing + 60s update → a clean Prometheus counter (use increase()/rate()).
  # Includes the in-progress run so the value is live and stays monotonic.
  - platform: template
    name: ${name} Pump 1 Water Seconds
    id: pump1_water_seconds
    unit_of_measurement: s
    device_class: duration   # → Prometheus metric homeassistant_sensor_duration_s
    icon: mdi:water-pump
    accuracy_decimals: 0
    state_class: total_increasing
    update_interval: 60s
    lambda: |-
      double s = id(pump1_seconds_total);
      if (id(pump1_on_ms) != 0) s += (millis() - id(pump1_on_ms)) / 1000.0;
      return s;
  - platform: template
    name: ${name} Pump 2 Water Seconds
    id: pump2_water_seconds
    unit_of_measurement: s
    device_class: duration   # → Prometheus metric homeassistant_sensor_duration_s
    icon: mdi:water-pump
    accuracy_decimals: 0
    state_class: total_increasing
    update_interval: 60s
    lambda: |-
      double s = id(pump2_seconds_total);
      if (id(pump2_on_ms) != 0) s += (millis() - id(pump2_on_ms)) / 1000.0;
      return s;
  - platform: template
    name: ${name} Pump 3 Water Seconds
    id: pump3_water_seconds
    unit_of_measurement: s
    device_class: duration   # → Prometheus metric homeassistant_sensor_duration_s
    icon: mdi:water-pump
    accuracy_decimals: 0
    state_class: total_increasing
    update_interval: 60s
    lambda: |-
      double s = id(pump3_seconds_total);
      if (id(pump3_on_ms) != 0) s += (millis() - id(pump3_on_ms)) / 1000.0;
      return s;
  - platform: template
    name: ${name} Pump 4 Water Seconds
    id: pump4_water_seconds
    unit_of_measurement: s
    device_class: duration   # → Prometheus metric homeassistant_sensor_duration_s
    icon: mdi:water-pump
    accuracy_decimals: 0
    state_class: total_increasing
    update_interval: 60s
    lambda: |-
      double s = id(pump4_seconds_total);
      if (id(pump4_on_ms) != 0) s += (millis() - id(pump4_on_ms)) / 1000.0;
      return s;

# Master enable. Defaults OFF so the device never waters until you turn it on
# (e.g. after the sensors/hoses are wired). Also gives a single "stop everything" toggle.
switch:
  - platform: template
    name: ${name} Auto Watering
    id: auto_watering
    icon: mdi:water-sync
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      # Evaluate immediately when switched on (don't wait for the next interval),
      # still respecting the daytime window.
      - if:
          condition:
            lambda: |-
              auto t = id(ha_time).now();
              return t.is_valid() && t.hour >= ${day_start} && t.hour < ${day_end};
          then:
            - script.execute: do_water_cycle

  # --- Pumps (1-4), also manually controllable from Home Assistant ---
  - platform: gpio
    pin: 13
    id: pump1
    name: ${name} Pump 1
    icon: mdi:water-pump
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: 'id(pump1_on_ms) = millis();'
    on_turn_off:
      - lambda: 'if (id(pump1_on_ms) != 0) { id(pump1_seconds_total) += (millis() - id(pump1_on_ms)) / 1000.0; id(pump1_on_ms) = 0; }'
  - platform: gpio
    pin: 4
    id: pump2
    name: ${name} Pump 2
    icon: mdi:water-pump
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: 'id(pump2_on_ms) = millis();'
    on_turn_off:
      - lambda: 'if (id(pump2_on_ms) != 0) { id(pump2_seconds_total) += (millis() - id(pump2_on_ms)) / 1000.0; id(pump2_on_ms) = 0; }'
  - platform: gpio
    pin: 16
    id: pump3
    name: ${name} Pump 3
    icon: mdi:water-pump
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: 'id(pump3_on_ms) = millis();'
    on_turn_off:
      - lambda: 'if (id(pump3_on_ms) != 0) { id(pump3_seconds_total) += (millis() - id(pump3_on_ms)) / 1000.0; id(pump3_on_ms) = 0; }'
  - platform: gpio
    pin: 17
    id: pump4
    name: ${name} Pump 4
    icon: mdi:water-pump
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: 'id(pump4_on_ms) = millis();'
    on_turn_off:
      - lambda: 'if (id(pump4_on_ms) != 0) { id(pump4_seconds_total) += (millis() - id(pump4_on_ms)) / 1000.0; id(pump4_on_ms) = 0; }'

  - platform: restart
    name: ${name} Restart

output:
  # Integrated BUZZER (GPIO23)
  - platform: ledc
    pin: GPIO23
    id: rtttl_out

# One watering pass: for each plant, if it's below its desired level, run the pump for
# >= watering_seconds, then pause (soak) before the next plant. mode:single means a new
# cycle can't start while one is running, so pumps never "stutter" the way the old
# 2-second toggle did. A plant with desired = 0 (or an unavailable HA value) is skipped.
script:
  - id: do_water_cycle
    mode: single
    then:
      - lambda: |-
          auto t = id(ha_time).now();
          ESP_LOGI("water", "cycle: time_valid=%d hour=%d | s1=%.0f/d%.0f/%.0fs s2=%.0f/d%.0f/%.0fs s3=%.0f/d%.0f/%.0fs s4=%.0f/d%.0f/%.0fs",
                   t.is_valid(), t.is_valid() ? (int) t.hour : -1,
                   id(Soil1).state, id(desired_mois_value_1).state, id(water_secs_1).state,
                   id(Soil2).state, id(desired_mois_value_2).state, id(water_secs_2).state,
                   id(Soil3).state, id(desired_mois_value_3).state, id(water_secs_3).state,
                   id(Soil4).state, id(desired_mois_value_4).state, id(water_secs_4).state);
      - if:
          condition:
            lambda: 'return id(Soil1).state < id(desired_mois_value_1).state;'
          then:
            - logger.log: "Droplet: watering plant 1"
            - switch.turn_on: pump1
            - delay: !lambda |-
                float s = id(water_secs_1).state;
                if (isnan(s) || s < 1) s = ${watering_seconds};
                return (uint32_t) (s * 1000.0);
            - switch.turn_off: pump1
            - delay: ${soak_seconds}s
      - if:
          condition:
            lambda: 'return id(Soil2).state < id(desired_mois_value_2).state;'
          then:
            - logger.log: "Droplet: watering plant 2"
            - switch.turn_on: pump2
            - delay: !lambda |-
                float s = id(water_secs_2).state;
                if (isnan(s) || s < 1) s = ${watering_seconds};
                return (uint32_t) (s * 1000.0);
            - switch.turn_off: pump2
            - delay: ${soak_seconds}s
      - if:
          condition:
            lambda: 'return id(Soil3).state < id(desired_mois_value_3).state;'
          then:
            - logger.log: "Droplet: watering plant 3"
            - switch.turn_on: pump3
            - delay: !lambda |-
                float s = id(water_secs_3).state;
                if (isnan(s) || s < 1) s = ${watering_seconds};
                return (uint32_t) (s * 1000.0);
            - switch.turn_off: pump3
            - delay: ${soak_seconds}s
      - if:
          condition:
            lambda: 'return id(Soil4).state < id(desired_mois_value_4).state;'
          then:
            - logger.log: "Droplet: watering plant 4"
            - switch.turn_on: pump4
            - delay: !lambda |-
                float s = id(water_secs_4).state;
                if (isnan(s) || s < 1) s = ${watering_seconds};
                return (uint32_t) (s * 1000.0);
            - switch.turn_off: pump4
            - delay: ${soak_seconds}s

# Evaluate periodically. Only runs a watering cycle when auto-watering is ON and it is
# daytime (between day_start and day_end). If the time isn't known yet, it does nothing.
interval:
  - interval: ${check_interval}
    then:
      - if:
          condition:
            and:
              - switch.is_on: auto_watering
              - lambda: |-
                  auto t = id(ha_time).now();
                  if (!t.is_valid()) return false;
                  return t.hour >= ${day_start} && t.hour < ${day_end};
          then:
            - script.execute: do_water_cycle

button:
  # Manual "water now" — runs one cycle regardless of auto/daytime (still only
  # waters plants below their threshold). Handy for testing.
  - platform: template
    name: ${name} Water Now
    icon: mdi:watering-can
    on_press:
      - script.execute: do_water_cycle

binary_sensor:
  # Onboard button: short press wakes the OLED for 20s.
  - platform: gpio
    name: ${name} Button
    pin:
      number: 36
    on_click:
      - min_length: 10ms
        max_length: 350ms
        then:
          - lambda: id(oled).turn_on();
          - delay: 20s
          - lambda: id(oled).turn_off();
      - min_length: 500ms
        max_length: 1500ms
        then: []

  - platform: status
    name: ${name} Status
