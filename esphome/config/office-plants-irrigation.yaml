substitutions:
  # --- watering behaviour (tune here) ---
  watering_minutes: "5"    # FALLBACK only — per-plant run time (MINUTES) is set in HA (input_number.watering_minutes_pumpN)
  soak_seconds: "10"       # pause between plants in a cycle
  day_start: "8"           # run the ONE daily watering decision at this hour (08:00), and the
  day_end: "21"            # earliest hour an on-turn-on / manual eval may water; quiet after 21:00.
  # --- SLOW control loop (deliberate — do not turn this back into a fast reactive loop) ---
  # Soil-moisture probes lag watering by MANY HOURS (water must diffuse through the soil to
  # reach the probe). A fast loop re-measures before the last dose has registered and waters
  # again and again — on 2026-06-14 plant 4 got 12×3-min runs in one morning and then drifted
  # up ~58%→~82% over the next 3 days. So: evaluate once per day, and never re-water a plant
  # until its last dose has had a full settle window to show up. "Water one day, measure the next."
  min_water_interval_h: "24"  # per-plant lockout (hours) between waterings. Raise to 48 for
                              # water-one-day / skip-one-day / measure cadence.

esphome:
  name: office-plants-irrigation
  friendly_name: "Office Plants Irrigation"
  name_add_mac_suffix: false   # single device; stable node name so HA reconnects to the same integration
  project:
    name: pricelesstoolkit.droplet
    version: "1.1"

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

ota:
  - platform: esphome
    password: !secret ota_password   # must match the device's current OTA password to upload

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  ap:
    ssid: "Office Plants Irrigation AP"
    password: !secret ap_password

captive_portal:

# Time source (for the daytime guard). SNTP from the OPNsense gateway (local-first,
# works WAN-down) with public fallback. NOTE: the `homeassistant` time platform
# returns UTC and ignores `timezone:`, which broke the daytime window — SNTP honours it.
time:
  - platform: sntp
    id: ha_time
    timezone: "EET-2EEST,M3.5.0/3,M10.5.0/4"   # Europe/Tallinn (POSIX)
    servers:
      - 192.168.2.1        # OPNsense NTP (LAN)
      - 0.pool.ntp.org
      - 1.pool.ntp.org
    on_time:
      # The ONE watering decision per day. Fires only when SNTP time is valid. The slow
      # cadence is the whole point — see the substitutions block. Per-plant lockout in
      # do_water_cycle still applies, so this never double-doses.
      - seconds: 0
        minutes: 0
        hours: ${day_start}
        then:
          - if:
              condition:
                switch.is_on: auto_watering
              then:
                - script.execute: do_water_cycle

one_wire: # https://esphome.io/components/one_wire
  - platform: gpio
    pin: GPIO25

i2c: # i2c Pins
  sda: 21
  scl: 22
  scan: true

mcp23017: # Expansion Board  https://esphome.io/components/mcp230xx.html
  - id: mcp23017_hub
    address: 0x20

# (OLED removed — the onboard SSD1306 display + its arial.ttf font were dropped: the
# display needed a button press to wake and was never used. Plant status lives in Home
# Assistant / Grafana, and a wall-mounted e-ink display is planned. See docs/office-plants.)

# Integrated BUZZER (GPIO23, jumper 1). Only sounds when the play_rtttl service is called —
# nothing here buzzes on its own.
rtttl:
  output: rtttl_out
  on_finished_playback:
    - logger.log: Song ended!

api:
  services:
    - service: play_rtttl
      variables:
        song_str: string
      then:
        - rtttl.play:
            rtttl: !lambda 'return song_str;'
  encryption:
    key: !secret api_encryption_key

# Per-pump cumulative run-time (time proxy for water used; no flow meter on this rig).
# pumpN_seconds_total is a monotonic counter persisted to flash (survives reboots);
# pumpN_on_ms holds the start millis() while a pump is running (runtime only).
globals:
  - { id: pump1_on_ms, type: uint32_t, restore_value: no, initial_value: '0' }
  - { id: pump2_on_ms, type: uint32_t, restore_value: no, initial_value: '0' }
  - { id: pump3_on_ms, type: uint32_t, restore_value: no, initial_value: '0' }
  - { id: pump4_on_ms, type: uint32_t, restore_value: no, initial_value: '0' }
  - { id: pump1_seconds_total, type: double, restore_value: yes, initial_value: '0' }
  - { id: pump2_seconds_total, type: double, restore_value: yes, initial_value: '0' }
  - { id: pump3_seconds_total, type: double, restore_value: yes, initial_value: '0' }
  - { id: pump4_seconds_total, type: double, restore_value: yes, initial_value: '0' }
  # Wall-clock epoch (seconds) of each plant's last watering — drives the per-plant settle
  # lockout. restore_value so the lockout survives reboots (0 = never watered yet).
  - { id: pump1_last_water_epoch, type: double, restore_value: yes, initial_value: '0' }
  - { id: pump2_last_water_epoch, type: double, restore_value: yes, initial_value: '0' }
  - { id: pump3_last_water_epoch, type: double, restore_value: yes, initial_value: '0' }
  - { id: pump4_last_water_epoch, type: double, restore_value: yes, initial_value: '0' }
  # Set by the "Water Now" button to bypass the settle lockout for one cycle (manual testing).
  - { id: force_water, type: bool, restore_value: no, initial_value: 'false' }

sensor:
  # --- Raw ADC voltage per channel (calibration aid; disabled in HA by default) ---
  - { platform: adc, pin: { number: 34, allow_other_uses: true }, id: soil1_raw, name: "Soil1 raw", attenuation: 12db, unit_of_measurement: V, accuracy_decimals: 3, update_interval: 5s, entity_category: diagnostic, disabled_by_default: true }
  - { platform: adc, pin: { number: 35, allow_other_uses: true }, id: soil2_raw, name: "Soil2 raw", attenuation: 12db, unit_of_measurement: V, accuracy_decimals: 3, update_interval: 5s, entity_category: diagnostic, disabled_by_default: true }
  - { platform: adc, pin: { number: 32, allow_other_uses: true }, id: soil3_raw, name: "Soil3 raw", attenuation: 12db, unit_of_measurement: V, accuracy_decimals: 3, update_interval: 5s, entity_category: diagnostic, disabled_by_default: true }
  - { platform: adc, pin: { number: 33, allow_other_uses: true }, id: soil4_raw, name: "Soil4 raw", attenuation: 12db, unit_of_measurement: V, accuracy_decimals: 3, update_interval: 5s, entity_category: diagnostic, disabled_by_default: true }

  # --- Soil moisture, one ADC per plant (1-4) ---
  - platform: adc
    pin: { number: 34, allow_other_uses: true }
    id: Soil1
    name: SoilM Sens 1
    icon: mdi:water-percent
    update_interval: 60s   # 1-min reporting: plenty for soil + cuts WiFi airtime. Control loop reads .state inside do_water_cycle (every 15 min), so this resolution is ample.
    unit_of_measurement: '%'
    attenuation: 12db
    filters:
      - calibrate_linear:
          - 2.300 -> 0.00      # Calibrate Min in dry soil
          - 0.89 -> 100.00     # Calibrate MAX in 100% wet soil
      - clamp: { min_value: 0, max_value: 100 }
    accuracy_decimals: 0

  - platform: adc
    pin: { number: 35, allow_other_uses: true }
    id: Soil2
    name: SoilM Sens 2
    icon: mdi:water-percent
    update_interval: 60s   # 1-min reporting: plenty for soil + cuts WiFi airtime. Control loop reads .state inside do_water_cycle (every 15 min), so this resolution is ample.
    unit_of_measurement: '%'
    attenuation: 12db
    filters:
      - calibrate_linear:
          - 2.300 -> 0.00
          - 0.89 -> 100.00
      - clamp: { min_value: 0, max_value: 100 }
    accuracy_decimals: 0

  - platform: adc
    pin: { number: 32, allow_other_uses: true }
    id: Soil3
    name: SoilM Sens 3
    icon: mdi:water-percent
    update_interval: 60s   # 1-min reporting: plenty for soil + cuts WiFi airtime. Control loop reads .state inside do_water_cycle (every 15 min), so this resolution is ample.
    unit_of_measurement: '%'
    attenuation: 12db
    filters:
      - calibrate_linear:
          - 2.300 -> 0.00
          - 0.89 -> 100.00
      - clamp: { min_value: 0, max_value: 100 }
    accuracy_decimals: 0

  - platform: adc
    pin: { number: 33, allow_other_uses: true }
    id: Soil4
    name: SoilM Sens 4
    icon: mdi:water-percent
    update_interval: 60s   # 1-min reporting: plenty for soil + cuts WiFi airtime. Control loop reads .state inside do_water_cycle (every 15 min), so this resolution is ample.
    unit_of_measurement: '%'
    attenuation: 12db
    filters:
      - calibrate_linear:
          - 2.300 -> 0.00
          - 0.89 -> 100.00
      - clamp: { min_value: 0, max_value: 100 }
    accuracy_decimals: 0

  # --- Desired moisture per plant, driven by Home Assistant helpers ---
  # Water runs while Soil < this value. Set to 0 to disable a plant.
  - platform: homeassistant
    id: desired_mois_value_1
    internal: true
    entity_id: input_number.moisture_level_for_pump1
  - platform: homeassistant
    id: desired_mois_value_2
    internal: true
    entity_id: input_number.moisture_level_for_pump2
  - platform: homeassistant
    id: desired_mois_value_3
    internal: true
    entity_id: input_number.moisture_level_for_pump3
  - platform: homeassistant
    id: desired_mois_value_4
    internal: true
    entity_id: input_number.moisture_level_for_pump4

  # --- Per-plant watering run time (MINUTES), driven by Home Assistant helpers ---
  # Bigger pots / soaker-hose priming need longer. Falls back to ${watering_minutes}
  # if the HA value is unavailable. Converted to ms (×60000) in do_water_cycle.
  - platform: homeassistant
    id: water_mins_1
    internal: true
    entity_id: input_number.watering_minutes_pump1
  - platform: homeassistant
    id: water_mins_2
    internal: true
    entity_id: input_number.watering_minutes_pump2
  - platform: homeassistant
    id: water_mins_3
    internal: true
    entity_id: input_number.watering_minutes_pump3
  - platform: homeassistant
    id: water_mins_4
    internal: true
    entity_id: input_number.watering_minutes_pump4

  - platform: wifi_signal
    name: WiFi Signal Sensor
    id: dbm
    update_interval: 60s

  - platform: uptime
    name: Uptime
    update_interval: 3600s

  # --- Per-pump cumulative run-time (seconds) — the "water used" time proxy. ---
  # total_increasing + 60s update → a clean Prometheus counter (use increase()/rate()).
  # Includes the in-progress run so the value is live and stays monotonic.
  - platform: template
    name: Pump 1 Water Seconds
    id: pump1_water_seconds
    unit_of_measurement: s
    device_class: duration   # → Prometheus metric homeassistant_sensor_duration_s
    icon: mdi:water-pump
    accuracy_decimals: 0
    state_class: total_increasing
    update_interval: 60s
    lambda: |-
      double s = id(pump1_seconds_total);
      if (id(pump1_on_ms) != 0) s += (millis() - id(pump1_on_ms)) / 1000.0;
      return s;
  - platform: template
    name: Pump 2 Water Seconds
    id: pump2_water_seconds
    unit_of_measurement: s
    device_class: duration   # → Prometheus metric homeassistant_sensor_duration_s
    icon: mdi:water-pump
    accuracy_decimals: 0
    state_class: total_increasing
    update_interval: 60s
    lambda: |-
      double s = id(pump2_seconds_total);
      if (id(pump2_on_ms) != 0) s += (millis() - id(pump2_on_ms)) / 1000.0;
      return s;
  - platform: template
    name: Pump 3 Water Seconds
    id: pump3_water_seconds
    unit_of_measurement: s
    device_class: duration   # → Prometheus metric homeassistant_sensor_duration_s
    icon: mdi:water-pump
    accuracy_decimals: 0
    state_class: total_increasing
    update_interval: 60s
    lambda: |-
      double s = id(pump3_seconds_total);
      if (id(pump3_on_ms) != 0) s += (millis() - id(pump3_on_ms)) / 1000.0;
      return s;
  - platform: template
    name: Pump 4 Water Seconds
    id: pump4_water_seconds
    unit_of_measurement: s
    device_class: duration   # → Prometheus metric homeassistant_sensor_duration_s
    icon: mdi:water-pump
    accuracy_decimals: 0
    state_class: total_increasing
    update_interval: 60s
    lambda: |-
      double s = id(pump4_seconds_total);
      if (id(pump4_on_ms) != 0) s += (millis() - id(pump4_on_ms)) / 1000.0;
      return s;

# Master enable. Defaults OFF so the device never waters until you turn it on
# (e.g. after the sensors/hoses are wired). Also gives a single "stop everything" toggle.
switch:
  - platform: template
    name: Auto Watering
    id: auto_watering
    icon: mdi:water-sync
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      # Evaluate immediately when switched on (don't wait for the next interval),
      # still respecting the daytime window.
      - if:
          condition:
            lambda: |-
              auto t = id(ha_time).now();
              return t.is_valid() && t.hour >= ${day_start} && t.hour < ${day_end};
          then:
            - script.execute: do_water_cycle

  # --- Pumps (1-4), also manually controllable from Home Assistant ---
  - platform: gpio
    pin: 13
    id: pump1
    name: Pump 1
    icon: mdi:water-pump
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: |-
          id(pump1_on_ms) = millis();
          if (id(ha_time).now().is_valid()) id(pump1_last_water_epoch) = id(ha_time).now().timestamp;
    on_turn_off:
      - lambda: 'if (id(pump1_on_ms) != 0) { id(pump1_seconds_total) += (millis() - id(pump1_on_ms)) / 1000.0; id(pump1_on_ms) = 0; }'
  - platform: gpio
    pin: 4
    id: pump2
    name: Pump 2
    icon: mdi:water-pump
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: |-
          id(pump2_on_ms) = millis();
          if (id(ha_time).now().is_valid()) id(pump2_last_water_epoch) = id(ha_time).now().timestamp;
    on_turn_off:
      - lambda: 'if (id(pump2_on_ms) != 0) { id(pump2_seconds_total) += (millis() - id(pump2_on_ms)) / 1000.0; id(pump2_on_ms) = 0; }'
  - platform: gpio
    pin: 16
    id: pump3
    name: Pump 3
    icon: mdi:water-pump
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: |-
          id(pump3_on_ms) = millis();
          if (id(ha_time).now().is_valid()) id(pump3_last_water_epoch) = id(ha_time).now().timestamp;
    on_turn_off:
      - lambda: 'if (id(pump3_on_ms) != 0) { id(pump3_seconds_total) += (millis() - id(pump3_on_ms)) / 1000.0; id(pump3_on_ms) = 0; }'
  - platform: gpio
    pin: 17
    id: pump4
    name: Pump 4
    icon: mdi:water-pump
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: |-
          id(pump4_on_ms) = millis();
          if (id(ha_time).now().is_valid()) id(pump4_last_water_epoch) = id(ha_time).now().timestamp;
    on_turn_off:
      - lambda: 'if (id(pump4_on_ms) != 0) { id(pump4_seconds_total) += (millis() - id(pump4_on_ms)) / 1000.0; id(pump4_on_ms) = 0; }'

  - platform: restart
    name: Restart

output:
  # Integrated BUZZER (GPIO23)
  - platform: ledc
    pin: GPIO23
    id: rtttl_out

# One watering pass: for each plant, water it ONLY if (a) it's below its desired level AND
# (b) it hasn't been watered within ${min_water_interval_h} hours (the settle lockout — so we
# decide on a settled reading, not on soil that's still soaking up the last dose). Then run the
# pump for watering_minutes and soak before the next plant. mode:single means a new cycle
# can't start while one is running. A plant with desired = 0 (or unavailable HA value) is skipped.
# The "Water Now" button sets force_water to bypass the lockout for one manual cycle.
script:
  - id: do_water_cycle
    mode: single
    then:
      - lambda: |-
          auto t = id(ha_time).now();
          ESP_LOGI("water", "cycle: time_valid=%d hour=%d | s1=%.0f/d%.0f/%.1fmin s2=%.0f/d%.0f/%.1fmin s3=%.0f/d%.0f/%.1fmin s4=%.0f/d%.0f/%.1fmin",
                   t.is_valid(), t.is_valid() ? (int) t.hour : -1,
                   id(Soil1).state, id(desired_mois_value_1).state, id(water_mins_1).state,
                   id(Soil2).state, id(desired_mois_value_2).state, id(water_mins_2).state,
                   id(Soil3).state, id(desired_mois_value_3).state, id(water_mins_3).state,
                   id(Soil4).state, id(desired_mois_value_4).state, id(water_mins_4).state);
      - if:
          condition:
            lambda: |-
              if (isnan(id(Soil1).state) || isnan(id(desired_mois_value_1).state)) return false;  // sensors not ready (e.g. at boot) → fail-safe, never water blind
              if (id(Soil1).state >= id(desired_mois_value_1).state) return false;  // at/above target (desired=0 disables)
              if (id(force_water)) return true;                                     // manual "Water Now" override
              time_t now = id(ha_time).now().timestamp;
              double last = id(pump1_last_water_epoch);
              return last <= 0 || (now - last) >= (${min_water_interval_h} * 3600.0);  // settle lockout elapsed
          then:
            - logger.log: "Droplet: watering plant 1"
            - switch.turn_on: pump1
            - delay: !lambda |-
                float m = id(water_mins_1).state;
                if (isnan(m) || m < 1) m = ${watering_minutes};
                return (uint32_t) (m * 60000.0);
            - switch.turn_off: pump1
            - delay: ${soak_seconds}s
      - if:
          condition:
            lambda: |-
              if (isnan(id(Soil2).state) || isnan(id(desired_mois_value_2).state)) return false;  // sensors not ready (e.g. at boot) → fail-safe, never water blind
              if (id(Soil2).state >= id(desired_mois_value_2).state) return false;  // at/above target (desired=0 disables)
              if (id(force_water)) return true;                                     // manual "Water Now" override
              time_t now = id(ha_time).now().timestamp;
              double last = id(pump2_last_water_epoch);
              return last <= 0 || (now - last) >= (${min_water_interval_h} * 3600.0);  // settle lockout elapsed
          then:
            - logger.log: "Droplet: watering plant 2"
            - switch.turn_on: pump2
            - delay: !lambda |-
                float m = id(water_mins_2).state;
                if (isnan(m) || m < 1) m = ${watering_minutes};
                return (uint32_t) (m * 60000.0);
            - switch.turn_off: pump2
            - delay: ${soak_seconds}s
      - if:
          condition:
            lambda: |-
              if (isnan(id(Soil3).state) || isnan(id(desired_mois_value_3).state)) return false;  // sensors not ready (e.g. at boot) → fail-safe, never water blind
              if (id(Soil3).state >= id(desired_mois_value_3).state) return false;  // at/above target (desired=0 disables)
              if (id(force_water)) return true;                                     // manual "Water Now" override
              time_t now = id(ha_time).now().timestamp;
              double last = id(pump3_last_water_epoch);
              return last <= 0 || (now - last) >= (${min_water_interval_h} * 3600.0);  // settle lockout elapsed
          then:
            - logger.log: "Droplet: watering plant 3"
            - switch.turn_on: pump3
            - delay: !lambda |-
                float m = id(water_mins_3).state;
                if (isnan(m) || m < 1) m = ${watering_minutes};
                return (uint32_t) (m * 60000.0);
            - switch.turn_off: pump3
            - delay: ${soak_seconds}s
      - if:
          condition:
            lambda: |-
              if (isnan(id(Soil4).state) || isnan(id(desired_mois_value_4).state)) return false;  // sensors not ready (e.g. at boot) → fail-safe, never water blind
              if (id(Soil4).state >= id(desired_mois_value_4).state) return false;  // at/above target (desired=0 disables)
              if (id(force_water)) return true;                                     // manual "Water Now" override
              time_t now = id(ha_time).now().timestamp;
              double last = id(pump4_last_water_epoch);
              return last <= 0 || (now - last) >= (${min_water_interval_h} * 3600.0);  // settle lockout elapsed
          then:
            - logger.log: "Droplet: watering plant 4"
            - switch.turn_on: pump4
            - delay: !lambda |-
                float m = id(water_mins_4).state;
                if (isnan(m) || m < 1) m = ${watering_minutes};
                return (uint32_t) (m * 60000.0);
            - switch.turn_off: pump4
            - delay: ${soak_seconds}s
      # Clear the one-shot manual override so the daily/auto cycles stay lockout-governed.
      - lambda: 'id(force_water) = false;'

# The daily watering decision is driven by time.on_time at ${day_start} (see the time:
# component). No fast interval loop — that's what overwatered plant 4. The per-plant settle
# lockout in do_water_cycle is the real safety net; the daily cadence keeps it gentle.

button:
  # Manual "water now" — runs one cycle immediately, BYPASSING the settle lockout (sets
  # force_water), but still only waters plants below their threshold. Handy for testing.
  - platform: template
    name: Water Now
    icon: mdi:watering-can
    on_press:
      - lambda: 'id(force_water) = true;'
      - script.execute: do_water_cycle

binary_sensor:
  # Onboard button (GPIO36) — exposed to Home Assistant. Its old job (waking the OLED)
  # is gone with the display; left here as a plain button to repurpose later.
  - platform: gpio
    name: Button
    pin:
      number: 36

  - platform: status
    name: Status
